<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>עולם דור - הכנה לכיתה א׳</title>
    
    <!-- ייבוא פונטים וספריות חיצוניות -->
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <style>
        :root {
            --hero-blue: #2e5bff;
            --hero-red: #ff4757;
            --hero-yellow: #ffa502;
            --hero-green: #2ed573;
            --comic-black: #2f3542;
            --comic-white: #ffffff;
            --bg-gradient: radial-gradient(circle, #1e3799 0%, #0c2461 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Heebo', sans-serif;
            background: var(--bg-gradient);
            background-color: #0c2461;
            color: var(--comic-white);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* סגנון קומיקס ייחודי לכפתורים */
        .btn-geometric {
            position: relative;
            transform: translateZ(0);
            transition: all 0.1s ease;
            cursor: pointer;
            border: 4px solid var(--comic-black);
            box-shadow: 0 6px 0 0 var(--comic-black);
        }

        .btn-geometric:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 0 var(--comic-black);
        }

        /* סגנון כרטיסי משימה */
        .card-geometric {
            background: var(--comic-white);
            border: 6px solid var(--comic-black);
            border-radius: 32px;
            color: var(--comic-black);
            box-shadow: 0 12px 0 var(--comic-black);
        }

        /* אפקט נצנוץ לפסי התקדמות */
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            background-size: 200% 100%;
            animation: shimmer-anim 2s infinite;
        }

        @keyframes shimmer-anim {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // --- נתונים קבועים ---
        const HEROES = [
            { id: 'fire', name: 'גִּבּוֹר הָאֵשׁ', emoji: '🔥', color: '#ff4757' },
            { id: 'water', name: 'גִּבּוֹר הַמַּיִם', emoji: '🌊', color: '#2e5bff' },
            { id: 'wind', name: 'גִּבּוֹר הָרוּחַ', emoji: '🌪️', color: '#2ed573' },
            { id: 'thunder', name: 'גִּבּוֹר הַבָּרָק', emoji: '⚡', color: '#ffa502' },
        ];

        const SOLUTIONS = [
            { id: 1, label: 'לִנְשֹׁום עָמֹוק', emoji: '🫁', color: '#ff4757' },
            { id: 2, label: 'לִסְפֹּר עַד 10', emoji: '🔢', color: '#2e5bff' },
            { id: 3, label: 'לְבַקֵּשׁ עֶזְרָה', emoji: '🗣️', color: '#2ed573' },
            { id: 4, label: 'לִשְׁתּוֹת מַיִם', emoji: '🚰', color: '#22d3ee' },
            { id: 5, label: 'לָלֶכֶת הַצִּידָה', emoji: '🚶', color: '#a78bfa' },
            { id: 6, label: 'לְדַבֵּר עִם חָבֵר', emoji: '💬', color: '#ffa502' },
        ];

        // --- רכיבים משותפים ---
        const StatBadge = ({ icon, value }) => (
            <div className="bg-[#2f3542] px-4 py-2 rounded-full border-2 border-[#ffa502] flex items-center gap-2 shadow-md">
                <span className="text-[#ffa502] font-black">{icon}</span>
                <span className="text-white font-black text-sm">{value}</span>
            </div>
        );

        const ProgressBar = ({ progress, text }) => (
            <div className="w-full max-w-md h-8 bg-[#57606f] rounded-full border-4 border-white overflow-hidden relative">
                <div className="absolute inset-0 flex items-center justify-center text-[11px] font-black text-white z-10">
                    {text}: {progress}%
                </div>
                <div 
                    className="h-full bg-gradient-to-r from-[#2ed573] to-[#55efc4] border-r-4 border-white transition-all duration-700 shimmer"
                    style={{ width: `${progress}%` }}
                />
            </div>
        );

        // --- מסכים ---
        const HeroSelection = ({ onSelect }) => (
            <div className="flex flex-col items-center justify-center min-h-screen p-6">
                <div className="text-center mb-12">
                    <div className="text-7xl mb-4 animate-float">🌍</div>
                    <h1 className="text-5xl font-black mb-2 text-white" style={{ textShadow: '4px 4px 0 var(--comic-black)' }}>עוֹלָם דּוֹר</h1>
                    <p className="text-[#ffa502] font-black text-xl">בְּחַר אֶת הַגִּבּוֹר שֶׁלְּךָ!</p>
                </div>
                <div className="grid grid-cols-2 gap-6 w-full max-w-md">
                    {HEROES.map(h => (
                        <button 
                            key={h.id} 
                            onClick={() => onSelect(h.id)}
                            className="btn-geometric p-8 rounded-[32px] flex flex-col items-center gap-3"
                            style={{ backgroundColor: h.color }}
                        >
                            <span className="text-6xl animate-float">{h.emoji}</span>
                            <span className="text-white font-black text-xl">{h.name}</span>
                        </button>
                    ))}
                </div>
            </div>
        );

        const HomeScreen = ({ save, onNavigate }) => {
            const hero = HEROES.find(h => h.id === save.hero) || HEROES[0];
            return (
                <div className="flex flex-col min-h-screen">
                    <header className="h-[120px] flex items-center justify-between px-8 bg-black/20 border-b-4 border-[#2f3542]">
                        <div className="flex items-center gap-4 text-right">
                            <div className="w-[80px] h-[80px] bg-[#ffa502] border-4 border-[#2f3542] rounded-full flex items-center justify-center text-4xl animate-float shadow-lg">
                                {hero.emoji}
                            </div>
                            <div>
                                <h2 className="text-white font-black text-2xl leading-none">דּוֹר הַגִּבּוֹר</h2>
                                <p className="text-[#ffa502] font-black text-lg">שָׁלָב {save.level}</p>
                            </div>
                        </div>
                        <div className="flex gap-3">
                            <StatBadge icon="⭐" value={save.xp} />
                            <StatBadge icon="⚡" value={save.history.length} />
                        </div>
                    </header>

                    <main className="flex-1 grid grid-cols-1 md:grid-cols-3 gap-8 p-10 items-center">
                        <div onClick={() => onNavigate('wheel')} className="card-geometric h-[420px] p-8 flex flex-col items-center justify-between cursor-pointer hover:scale-105 transition-transform">
                            <div className="text-8xl animate-float">🎡</div>
                            <div className="text-center">
                                <h2 className="font-black text-3xl mb-1">גַּלְגַּל הַפִּתְרוֹנוֹת</h2>
                                <p className="text-[#747d8c] font-bold">אֵיךְ לְנַצֵּחַ כְּשֶׁיֵּשׁ רֶגֶשׁ חָזָק?</p>
                            </div>
                            <button className="btn-geometric w-full py-4 bg-[#2e5bff] text-white font-black text-xl rounded-2xl">
                                בּוֹא נְשַׂחֵק!
                            </button>
                        </div>

                        <div className="card-geometric h-[420px] p-8 flex flex-col items-center justify-between opacity-70 grayscale-[0.5] relative">
                            <div className="absolute top-4 bg-[#ffa502] px-4 py-1 border-4 border-black rounded-xl font-black text-sm -rotate-6">בְּקָרוֹב!</div>
                            <div className="text-8xl">📚</div>
                            <div className="text-center">
                                <h2 className="font-black text-3xl mb-1">מִגְדַּל הָאוֹתִיּוֹת</h2>
                                <p className="text-[#747d8c] font-bold">זִיהוּי אוֹתִיּוֹת וּצְלִילִים</p>
                            </div>
                            <button className="w-full py-4 bg-[#dfe4ea] text-[#2f3542] font-black text-xl rounded-2xl cursor-not-allowed border-4 border-black/10">
                                נָעוּל
                            </button>
                        </div>

                        <div className="card-geometric h-[420px] p-8 flex flex-col items-center justify-between opacity-70 grayscale-[0.5] relative">
                            <div className="text-8xl">🧩</div>
                            <div className="text-center">
                                <h2 className="font-black text-3xl mb-1">מַעְבָּדַת הַהִגָּיוֹן</h2>
                                <p className="text-[#747d8c] font-bold">פְּתִירַת חִידוֹת וְצִלּוּמִים</p>
                            </div>
                            <button className="w-full py-4 bg-[#dfe4ea] text-[#2f3542] font-black text-xl rounded-2xl cursor-not-allowed border-4 border-black/10">
                                נָעוּל
                            </button>
                        </div>
                    </main>

                    <footer className="h-[120px] bg-[#2f3542] flex items-center justify-between px-10">
                        <div className="flex gap-8 text-4xl">
                            <span>🏠</span>
                            <span className="opacity-50">🏆</span>
                            <span className="opacity-50">⚙️</span>
                        </div>
                        <ProgressBar progress={save.xp % 100} text="הִתְקַדְּמוּת לַמַּתָּנָה" />
                        <div className="flex items-center gap-3 font-black text-xl">
                            <span>🎒</span>
                            <span>הַתִּיק שֶׁלִּי</span>
                        </div>
                    </footer>
                </div>
            );
        };

        const WheelZone = ({ onBack, onComplete }) => {
            const [spinning, setSpinning] = useState(false);
            const [rotation, setRotation] = useState(0);
            const [result, setResult] = useState(null);

            const spin = () => {
                if (spinning) return;
                setSpinning(true);
                setResult(null);
                const newRotation = rotation + 1440 + Math.floor(Math.random() * 360);
                setRotation(newRotation);
                setTimeout(() => {
                    setSpinning(false);
                    const index = Math.floor((newRotation % 360) / (360 / SOLUTIONS.length));
                    setResult(SOLUTIONS[index]);
                }, 4000);
            };

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center">
                    <header className="absolute top-0 w-full p-8 flex justify-between items-center">
                        <button onClick={onBack} className="btn-geometric w-14 h-14 bg-white rounded-2xl flex items-center justify-center text-2xl">◀</button>
                        <h2 className="text-4xl font-black text-white drop-shadow-md">גַּלְגַּל הַפִּתְרוֹנוֹת</h2>
                        <div className="w-14" />
                    </header>

                    <div className="relative my-20 scale-110">
                        <div className="absolute top-[-40px] left-1/2 -translate-x-1/2 z-20 text-6xl">🔻</div>
                        <motion.div 
                            animate={{ rotate: rotation }}
                            transition={{ duration: 4, ease: [0.15, 0, 0.15, 1] }}
                            className="w-80 h-80 rounded-full border-[8px] border-[#2f3542] relative shadow-2xl overflow-hidden"
                            style={{ 
                                background: 'conic-gradient(from 0deg, #ff4757 0% 16.6%, #2e5bff 16.6% 33.3%, #2ed573 33.3% 50%, #22d3ee 50% 66.6%, #a78bfa 66.6% 83.3%, #ffa502 83.3% 100%)' 
                            }}
                        >
                            {SOLUTIONS.map((s, i) => (
                                <div key={s.id} className="absolute w-full h-full flex justify-center pt-8" style={{ transform: `rotate(${i * 60 + 30}deg)` }}>
                                    <span className="text-4xl drop-shadow-md">{s.emoji}</span>
                                </div>
                            ))}
                            <div className="absolute inset-0 m-auto w-20 h-20 bg-white border-8 border-[#2f3542] rounded-full flex items-center justify-center font-black text-[#2f3542]">דּוֹר</div>
                        </motion.div>
                    </div>

                    <AnimatePresence>
                        {result ? (
                            <motion.div initial={{ scale: 0.8, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} className="card-geometric w-full max-w-sm p-10 flex flex-col items-center gap-6">
                                <div className="text-8xl animate-float">{result.emoji}</div>
                                <h3 className="text-4xl font-black">{result.label}</h3>
                                <p className="text-gray-500 font-bold text-lg">יוֹפִי דּוֹר! זֶה פִּתְרוֹן מְעוּלֶה.</p>
                                <button onClick={() => onComplete(25)} className="btn-geometric w-full py-5 bg-[#2ed573] text-white font-black text-2xl rounded-2xl">
                                    הִצְלַחְתִּי! +25 ⚡
                                </button>
                            </motion.div>
                        ) : (
                            <div className="flex flex-col items-center gap-6">
                                <button onClick={spin} disabled={spinning} className="btn-geometric px-20 py-8 bg-[#ffa502] text-white font-black text-3xl rounded-[32px]">
                                    {spinning ? 'מִסְתּוֹבֵב...' : 'סוֹבֵב אֶת הַגַּלְגַּל!'}
                                </button>
                                {!spinning && <p className="text-white/60 font-black text-lg animate-pulse">מָה הַגִּבּוֹר יַעֲשֶׂה עַכְשָׁיו?</p>}
                            </div>
                        )}
                    </AnimatePresence>
                </div>
            );
        };

        // --- ניהול אפליקציה ראשי ---
        const App = () => {
            const [screen, setScreen] = useState('hero-select');
            const [save, setSave] = useState(() => {
                const local = localStorage.getItem('dor_world_save');
                return local ? JSON.parse(local) : { xp: 0, level: 1, hero: null, history: [] };
            });

            const updateSave = (newData) => {
                localStorage.setItem('dor_world_save', JSON.stringify(newData));
                setSave(newData);
            };

            const addXP = (amount) => {
                const newXP = save.xp + amount;
                const newLevel = Math.floor(newXP / 100) + 1;
                updateSave({ ...save, xp: newXP, level: newLevel, history: [...save.history, { date: Date.now() }] });
            };

            const onHeroSelect = (id) => {
                updateSave({ ...save, hero: id });
                setScreen('home');
            };

            useEffect(() => {
                if (save.hero && screen === 'hero-select') setScreen('home');
            }, []);

            return (
                <div dir="rtl">
                    <AnimatePresence mode="wait">
                        {screen === 'hero-select' && <motion.div key="1" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}}><HeroSelection onSelect={onHeroSelect} /></motion.div>}
                        {screen === 'home' && <motion.div key="2" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}}><HomeScreen save={save} onNavigate={setScreen} /></motion.div>}
                        {screen === 'wheel' && <motion.div key="3" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}}><WheelZone onBack={() => setScreen('home')} onComplete={(xp) => { addXP(xp); setScreen('home'); }} /></motion.div>}
                    </AnimatePresence>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
