<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>עולם דור 🌍</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;background:#050015;overscroll-behavior:none;font-family:'Heebo',sans-serif}
    html{-webkit-overflow-scrolling:touch}

    /* ── 3D Button system ── */
    .btn-3d {
      position:relative;
      transform-style:preserve-3d;
      transition:transform 0.12s ease, box-shadow 0.12s ease;
    }
    .btn-3d::after {
      content:'';
      position:absolute;
      inset:0;
      border-radius:inherit;
      background:rgba(0,0,0,0.35);
      transform:translateY(5px) translateZ(-4px);
      filter:blur(2px);
      transition:transform 0.12s ease, opacity 0.12s ease;
      z-index:-1;
    }
    .btn-3d:active{transform:translateY(3px) scale(0.97);}
    .btn-3d:active::after{transform:translateY(2px) translateZ(-2px);opacity:0.5;}

    /* ── Pulse ring on tap ── */
    .tap-ring{position:relative;overflow:visible;}
    .tap-ring:active::before{
      content:'';
      position:absolute;
      inset:-6px;
      border-radius:inherit;
      border:3px solid currentColor;
      opacity:0.5;
      animation:tapRing 0.4s ease-out forwards;
    }
    @keyframes tapRing{
      0%{transform:scale(0.9);opacity:0.6}
      100%{transform:scale(1.2);opacity:0}
    }

    /* ── Entrance animations ── */
    @keyframes slideUp{
      from{opacity:0;transform:translateY(24px)}
      to{opacity:1;transform:translateY(0)}
    }
    @keyframes popIn{
      from{opacity:0;transform:scale(0.7)}
      to{opacity:1;transform:scale(1)}
    }
    @keyframes fadeIn{
      from{opacity:0}to{opacity:1}
    }
    @keyframes shimmer{
      0%{background-position:200% center}
      100%{background-position:-200% center}
    }
    @keyframes floatBob{
      0%,100%{transform:translateY(0px)}
      50%{transform:translateY(-10px)}
    }
    @keyframes glowPulse{
      0%,100%{opacity:0.6}50%{opacity:1}
    }
    @keyframes heroFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes wrongShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
    @keyframes correctPop{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}
    @keyframes sparkleOut{0%{opacity:1;transform:scale(0.5)}50%{opacity:1;transform:scale(1.3)}100%{opacity:0;transform:scale(1.8)}}
    @keyframes confettiFall{to{transform:translateY(110vh) rotate(360deg);opacity:0}}
    @keyframes breathe{0%,100%{transform:scale(1);opacity:0.7}50%{transform:scale(1.35);opacity:1}}
    @keyframes xpPop{0%{opacity:0;transform:translateX(-50%) translateY(0)}20%{opacity:1;transform:translateX(-50%) translateY(-10px)}80%{opacity:1;transform:translateX(-50%) translateY(-20px)}100%{opacity:0;transform:translateX(-50%) translateY(-30px)}}
    @keyframes tapRingAnim{0%{transform:scale(1);opacity:0.8}100%{transform:scale(1.5);opacity:0}}
    @keyframes castleRise{from{opacity:0;transform:translateY(30px) scale(0.85)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes flagWave{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
    @keyframes towerGlow{0%,100%{box-shadow:0 0 12px #FFD70066}50%{box-shadow:0 0 28px #FFD700cc}}
    @keyframes stoneAppear{from{opacity:0;transform:scale(0.3) rotate(-15deg)}to{opacity:1;transform:scale(1) rotate(0deg)}}
    @keyframes windowLight{0%,100%{opacity:0.4}50%{opacity:1}}

    .slide-up{animation:slideUp 0.35s ease both}
    .pop-in{animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both}
    .fade-in{animation:fadeIn 0.4s ease both}

    /* stagger helpers */
    .delay-1{animation-delay:0.05s}
    .delay-2{animation-delay:0.10s}
    .delay-3{animation-delay:0.15s}
    .delay-4{animation-delay:0.20s}
    .delay-5{animation-delay:0.25s}
    .delay-6{animation-delay:0.30s}

    /* ── Wheel solution animations ── */
    @keyframes breatheRing {
      0%,100%{transform:scale(1);opacity:0.35}
      50%{transform:scale(1.55);opacity:0}
    }
    @keyframes breatheCore {
      0%,100%{transform:scale(1)}
      50%{transform:scale(1.28)}
    }
    @keyframes breatheText {
      0%,100%{opacity:0.7;transform:translateY(0)}
      50%{opacity:1;transform:translateY(-3px)}
    }
    @keyframes walkStep {
      0%,100%{transform:translateX(0) rotate(0deg)}
      25%{transform:translateX(6px) rotate(3deg)}
      75%{transform:translateX(-4px) rotate(-2deg)}
    }
    @keyframes coolWave {
      0%{transform:scaleX(0);transform-origin:right}
      100%{transform:scaleX(1);transform-origin:right}
    }
    @keyframes talkBubble {
      0%,100%{transform:scale(1)}
      50%{transform:scale(1.08)}
    }
    @keyframes waitCount {
      0%{transform:scale(1.2);opacity:0}
      20%{transform:scale(1);opacity:1}
      80%{transform:scale(1);opacity:1}
      100%{transform:scale(0.8);opacity:0}
    }
    @keyframes handshakeWiggle {
      0%,100%{transform:rotate(0deg)}
      25%{transform:rotate(-10deg)}
      75%{transform:rotate(10deg)}
    }
    @keyframes fadeWave {
      0%{opacity:1;transform:translateY(0)}
      100%{opacity:0;transform:translateY(-20px)}
    }
    @keyframes laughBounce {
      0%,100%{transform:translateY(0) rotate(0deg)}
      25%{transform:translateY(-8px) rotate(-5deg)}
      75%{transform:translateY(-4px) rotate(5deg)}
    }
    @keyframes solutionEntrance {
      0%{opacity:0;transform:scale(0.5) rotate(-10deg)}
      60%{transform:scale(1.08) rotate(2deg)}
      100%{opacity:1;transform:scale(1) rotate(0deg)}
    }
    @keyframes ringPulse {
      0%{transform:scale(1);opacity:0.7}
      50%{transform:scale(1.6);opacity:0}
      100%{transform:scale(1);opacity:0}
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

// ─── persistence ─────────────────────────────────────────────────────────────
const SAVE_KEY = "dor_world_v2";
function loadSave() {
  try { return JSON.parse(localStorage.getItem(SAVE_KEY)) || {}; } catch { return {}; }
}
function writeSave(d) {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(d)); } catch {}
}

// ─── constants ───────────────────────────────────────────────────────────────
const HEROES = [
  { id:"fire",    name:"גיבור האש",    emoji:"🔥", color:"#FF4500", accent:"#FF6B35", glow:"#FF4500", sky:"#1a0500" },
  { id:"water",   name:"גיבור המים",   emoji:"🌊", color:"#00BFFF", accent:"#00E5FF", glow:"#00BFFF", sky:"#001830" },
  { id:"wind",    name:"גיבור הרוח",   emoji:"🌪️", color:"#00FF7F", accent:"#00FF7F", glow:"#00CC66", sky:"#001a10" },
  { id:"thunder", name:"גיבור הברק",   emoji:"⚡",  color:"#FFD700", accent:"#FFE44D", glow:"#FFD700", sky:"#111100" },
];

const ZONES = [
  { id:"wheel",   label:"גלגל הפתרונות", emoji:"🎡", color:"#FF6B35", darkBg:"#2d0f00", desc:"פתרון בעיות" },
  { id:"kingdom", label:"משחק הממלכה",   emoji:"👑", color:"#FFD700", darkBg:"#2d2500", desc:"כרטיסיות ירוק/אדום" },
  { id:"letters", label:"מרחב למידה",    emoji:"📚", color:"#A78BFA", darkBg:"#180030", desc:"אותיות ומספרים" },
  { id:"puzzle",  label:"מגדל ההרכבה",   emoji:"🧩", color:"#60A5FA", darkBg:"#001830", desc:"פאזלים" },
  { id:"hero",    label:"סדנת גיבורים",  emoji:"🦸", color:"#F472B6", darkBg:"#2d0020", desc:"בנה גיבור" },
  { id:"art",     label:"סטודיו יצירה",  emoji:"🎨", color:"#FB923C", darkBg:"#2d1000", desc:"ציור חופשי" },
];

const XP_PER_LEVEL = 100;
function getLevel(xp) { return Math.floor((xp||0) / XP_PER_LEVEL) + 1; }
function getLevelXP(xp) { return (xp||0) % XP_PER_LEVEL; }

// ─── tiny shared components ───────────────────────────────────────────────────
function Stars({ n = 0, max = 5, size = 16 }) {
  return (
    <div className="flex gap-0.5 items-center">
      {Array.from({ length: max }).map((_, i) => (
        <span key={i} style={{
          fontSize: size,
          opacity: i < n ? 1 : 0.18,
          filter: i < n ? "drop-shadow(0 0 4px #FFD700)" : "none",
          transform: i < n ? "scale(1.1)" : "scale(0.9)",
          display:"inline-block",
          transition:"all 0.3s ease",
          animationDelay: `${i*0.06}s`,
        }}>⭐</span>
      ))}
    </div>
  );
}

function XPBar({ xp, hero }) {
  const lvl = getLevel(xp);
  const cur = getLevelXP(xp);
  const pct = (cur / XP_PER_LEVEL) * 100;
  return (
    <div className="w-full">
      <div className="flex justify-between items-center mb-1.5">
        <span style={{ color: hero.accent, fontFamily:"Heebo,sans-serif", fontWeight:900, fontSize:13 }}>
          🏅 רמה {lvl} · {xp || 0} ⚡
        </span>
        <span style={{ color:"#9ca3af", fontSize:11 }}>{cur}/{XP_PER_LEVEL} לרמה הבאה</span>
      </div>
      <div className="relative rounded-full overflow-hidden"
        style={{ height:22, border:`2px solid ${hero.accent}66`, background:"#0d0d1a",
          boxShadow:`inset 0 2px 6px rgba(0,0,0,0.5)` }}>
        <div className="h-full rounded-full transition-all duration-1000 relative overflow-hidden"
          style={{ width:`${pct}%`,
            background:`linear-gradient(90deg, ${hero.color}, ${hero.accent}, ${hero.color})`,
            backgroundSize:"200% 100%",
            animation:"shimmer 2.5s linear infinite",
            boxShadow:`0 0 14px ${hero.glow}88, inset 0 1px 0 rgba(255,255,255,0.3)` }}>
        </div>
        <div className="absolute inset-0 rounded-full" style={{
          background:"linear-gradient(180deg,rgba(255,255,255,0.12) 0%,transparent 60%)"}}/>
        <span className="absolute inset-0 flex items-center justify-center font-black"
          style={{ fontSize:11, color:"white", textShadow:"0 1px 3px #000", fontFamily:"Heebo,sans-serif" }}>
          {Math.round(pct)}%
        </span>
      </div>
    </div>
  );
}

// ─── animated city skyline ─────────────────────────────────────────────────
function CitySkyline({ hero }) {
  const buildings = [
    { x: 0,   w: 50,  h: 90,  windows: [[10,20],[10,40],[10,60],[30,20],[30,40],[30,60]] },
    { x: 55,  w: 35,  h: 130, windows: [[8,15],[8,35],[8,55],[8,75],[8,95],[22,15],[22,35],[22,55],[22,75],[22,95]] },
    { x: 95,  w: 60,  h: 75,  windows: [[10,15],[10,35],[10,55],[28,15],[28,35],[28,55],[44,15],[44,35],[44,55]] },
    { x: 160, w: 40,  h: 110, windows: [[8,20],[8,40],[8,60],[8,80],[25,20],[25,40],[25,60],[25,80]] },
    { x: 205, w: 30,  h: 85,  windows: [[7,15],[7,35],[7,55],[7,75],[18,15],[18,35],[18,55]] },
    { x: 240, w: 55,  h: 120, windows: [[10,15],[10,35],[10,55],[10,75],[10,95],[28,15],[28,35],[28,55],[28,75],[28,95],[42,15],[42,35],[42,55]] },
    { x: 300, w: 45,  h: 95,  windows: [[8,15],[8,35],[8,55],[8,75],[24,15],[24,35],[24,55],[24,75],[38,15],[38,35]] },
    { x: 350, w: 35,  h: 140, windows: [[7,15],[7,35],[7,55],[7,75],[7,95],[7,115],[22,15],[22,35],[22,55],[22,75],[22,95],[22,115]] },
  ];
  return (
    <svg viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg" style={{ width: "100%", height: "auto", display: "block" }}>
      {/* sky gradient */}
      <defs>
        <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={hero.sky} />
          <stop offset="100%" stopColor="#050015" />
        </linearGradient>
        <linearGradient id="buildGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor="#1a1a2e" />
          <stop offset="100%" stopColor="#16213e" />
        </linearGradient>
      </defs>
      <rect width="400" height="160" fill="url(#skyGrad)" />
      {/* stars */}
      {[{cx:30,cy:15},{cx:80,cy:8},{cx:150,cy:20},{cx:220,cy:10},{cx:290,cy:18},{cx:360,cy:12},{cx:180,cy:5},{cx:60,cy:25}].map((s,i)=>(
        <circle key={i} cx={s.cx} cy={s.cy} r="1.5" fill="white" opacity="0.7">
          <animate attributeName="opacity" values="0.7;0.2;0.7" dur={`${1.5+i*0.3}s`} repeatCount="indefinite"/>
        </circle>
      ))}
      {/* moon */}
      <circle cx="370" cy="22" r="14" fill="#ffe8a0" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.7;0.9" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="376" cy="18" r="10" fill={hero.sky} />
      {/* hero glow in sky */}
      <circle cx="200" cy="60" r="50" fill={hero.glow} opacity="0.06"/>
      {/* buildings */}
      {buildings.map((b, i) => (
        <g key={i}>
          <rect x={b.x} y={160 - b.h} width={b.w} height={b.h} fill="url(#buildGrad)" />
          <rect x={b.x} y={160 - b.h} width={b.w} height="4" fill={hero.accent} opacity="0.6"/>
          {b.windows.map(([wx, wy], j) => {
            const lit = Math.random() > 0.35;
            return (
              <rect key={j} x={b.x + wx} y={160 - b.h + wy} width="7" height="5" rx="1"
                fill={lit ? hero.accent : "#222"} opacity={lit ? 0.9 : 0.5}>
                {lit && <animate attributeName="opacity" values="0.9;0.5;0.9" dur={`${2+j*0.4}s`} repeatCount="indefinite"/>}
              </rect>
            );
          })}
          {/* roof details */}
          {i % 3 === 0 && <rect x={b.x + b.w/2 - 2} y={160 - b.h - 12} width="4" height="12" fill="#333"/>}
          {i % 3 === 0 && <circle cx={b.x + b.w/2} cy={160 - b.h - 14} r="3" fill={hero.accent} opacity="0.8">
            <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.2s" repeatCount="indefinite"/>
          </circle>}
        </g>
      ))}
      {/* ground */}
      <rect y="155" width="400" height="5" fill="#0a0a1a"/>
    </svg>
  );
}

// ─── hero avatar with glow ───────────────────────────────────────────────────
function HeroAvatar({ hero, size = 80 }) {
  return (
    <div className="relative flex items-center justify-center" style={{ width: size, height: size }}>
      <div className="absolute inset-0 rounded-full animate-pulse"
        style={{ background: `radial-gradient(circle, ${hero.glow}66 0%, transparent 70%)`, animationDuration: "2s" }} />
      <div className="relative rounded-full flex items-center justify-center border-4"
        style={{ width: size, height: size, fontSize: size * 0.5, background: `radial-gradient(circle at 35% 35%, ${hero.color}44, ${hero.sky})`, borderColor: hero.accent, boxShadow: `0 0 20px ${hero.glow}88, inset 0 0 20px ${hero.glow}22` }}>
        {hero.emoji}
      </div>
    </div>
  );
}

// ─── zone card ───────────────────────────────────────────────────────────────
function ZoneCard({ zone, stars, onClick, index }) {
  const s = stars || 0;
  return (
    <button onClick={onClick}
      className="btn-3d tap-ring relative rounded-3xl p-4 text-right overflow-hidden slide-up"
      style={{
        border:`2px solid ${zone.color}55`,
        background:`linear-gradient(145deg, ${zone.darkBg} 0%, #06001e 100%)`,
        boxShadow:`0 6px 24px ${zone.color}25, 0 2px 0 ${zone.color}44, inset 0 1px 0 rgba(255,255,255,0.07)`,
        animationDelay:`${index*0.07}s`,
        color:zone.color,
      }}>
      {/* shimmer top edge */}
      <div className="absolute top-0 left-0 right-0 h-px rounded-full"
        style={{background:`linear-gradient(90deg,transparent,${zone.color}88,transparent)`}}/>
      {/* glow blob */}
      <div className="absolute -top-6 -left-6 w-20 h-20 rounded-full opacity-25 blur-2xl"
        style={{ background: zone.color }} />
      {/* content */}
      <div className="relative z-10 flex items-start gap-3">
        <div className="flex-shrink-0 rounded-2xl flex items-center justify-center"
          style={{ width:54, height:54, fontSize:28,
            background:`linear-gradient(135deg,${zone.color}33,${zone.color}11)`,
            border:`2px solid ${zone.color}55`,
            boxShadow:`0 4px 12px ${zone.color}33, inset 0 1px 0 rgba(255,255,255,0.1)` }}>
          {zone.emoji}
        </div>
        <div className="flex-1 min-w-0">
          <div style={{ color:"white", fontWeight:900, fontSize:14, lineHeight:1.2, fontFamily:"Heebo,sans-serif" }}>{zone.label}</div>
          <div style={{ color:"#9ca3af", fontSize:11, marginTop:2 }}>{zone.desc}</div>
          <div className="mt-1.5"><Stars n={s} max={5} size={11} /></div>
        </div>
        {s===5 && <div className="flex-shrink-0" style={{fontSize:18,filter:"drop-shadow(0 0 8px #FFD700)",animation:"floatBob 2s ease-in-out infinite"}}>👑</div>}
      </div>
      {/* progress bar */}
      <div className="relative mt-2.5 rounded-full overflow-hidden" style={{height:5,background:"#ffffff09"}}>
        <div className="h-full rounded-full transition-all duration-700"
          style={{ width:`${(s/5)*100}%`,
            background:`linear-gradient(90deg,${zone.color}77,${zone.color})`,
            boxShadow:`0 0 8px ${zone.color}88` }} />
      </div>
    </button>
  );
}

// ─── parent panel ────────────────────────────────────────────────────────────
function ParentPanel({ save, hero, onClose }) {
  const xp = save.xp || 0;
  const history = save.history || [];
  const zoneStars = save.zone_stars || {};
  const counts = {};
  history.forEach(h => { counts[h.label] = (counts[h.label] || 0) + 1; });
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);

  return (
    <div className="fixed inset-0 z-50 flex items-end justify-center" style={{ background: "rgba(0,0,0,0.85)" }} dir="rtl">
      <div className="w-full max-w-md rounded-t-3xl overflow-y-auto p-6 border-t-4"
        style={{ background: "linear-gradient(180deg, #0d0d2b 0%, #050015 100%)", borderColor: hero.accent, maxHeight: "88vh" }}>
        <div className="flex justify-between items-center mb-5">
          <button onClick={onClose} className="text-gray-400 text-2xl active:scale-95">✕</button>
          <h2 className="text-white font-black text-xl">🔒 מצב הורה</h2>
          <div style={{ width: 28 }} />
        </div>

        {/* summary */}
        <div className="grid grid-cols-3 gap-3 mb-5">
          {[
            { label: "רמה", value: getLevel(xp), icon: "🏅" },
            { label: "סה״כ XP", value: xp, icon: "⚡" },
            { label: "פעילויות", value: history.length, icon: "🎯" },
          ].map(s => (
            <div key={s.label} className="rounded-2xl p-3 text-center border" style={{ background: "#ffffff08", borderColor: hero.accent + "33" }}>
              <div className="text-2xl">{s.icon}</div>
              <div className="text-white font-black text-lg">{s.value}</div>
              <div className="text-gray-400 text-xs">{s.label}</div>
            </div>
          ))}
        </div>

        {/* zones */}
        <h3 className="text-sm font-black mb-3" style={{ color: hero.accent }}>כוכבים לפי אזור</h3>
        <div className="space-y-2 mb-5">
          {ZONES.map(z => (
            <div key={z.id} className="flex items-center justify-between rounded-xl px-3 py-2" style={{ background: "#ffffff06" }}>
              <Stars n={zoneStars[z.id] || 0} max={5} size={13} />
              <span className="text-white text-sm font-bold">{z.emoji} {z.label}</span>
            </div>
          ))}
        </div>

        {/* top solutions */}
        {sorted.length > 0 && <>
          <h3 className="text-sm font-black mb-3" style={{ color: hero.accent }}>פתרונות פופולריים</h3>
          <div className="space-y-2 mb-5">
            {sorted.slice(0, 5).map(([label, count]) => (
              <div key={label} className="flex items-center gap-3 rounded-xl px-3 py-2" style={{ background: "#ffffff06" }}>
                <div className="flex-1 h-2 rounded-full overflow-hidden" style={{ background: "#222" }}>
                  <div className="h-full rounded-full" style={{ width: `${(count / history.length) * 100}%`, background: hero.accent }} />
                </div>
                <span className="text-white text-xs font-bold w-24 text-right">{label} ({count})</span>
              </div>
            ))}
          </div>
        </>}

        {/* feelings */}
        <h3 className="text-sm font-black mb-3" style={{ color: hero.accent }}>תחושות אחרי פתרון</h3>

// spinning wheel SVG
function WheelSVG({ hero, onSelect, spinning, spinDeg }) {
  const VB=320, cx=160, cy=160, r=148, n=SOLUTIONS.length;
  return (
    <div className="relative flex items-center justify-center select-none w-full" style={{maxWidth:460}}>
      {/* outer glow ring */}
      <div className="absolute inset-0 rounded-full"
        style={{boxShadow:`0 0 50px ${hero.glow}55, 0 0 100px ${hero.glow}22`}}/>
      <svg viewBox={`0 0 ${VB} ${VB}`} width="100%" style={{
        transform:`rotate(${spinDeg}deg)`,
        transition: spinning ? "transform 2.6s cubic-bezier(0.25,0.1,0.1,1)" : "none",
        filter:`drop-shadow(0 0 14px ${hero.glow}77)`,
      }}>
        {/* outer ring */}
        <circle cx={cx} cy={cy} r={r+5} fill="none" stroke={hero.accent} strokeWidth="3.5" opacity="0.6"/>
        {SOLUTIONS.map((sol,i)=>{
          const a=(2*Math.PI*i)/n - Math.PI/2;
          const b=(2*Math.PI*(i+1))/n - Math.PI/2;
          const x1=cx+r*Math.cos(a), y1=cy+r*Math.sin(a);
          const x2=cx+r*Math.cos(b), y2=cy+r*Math.sin(b);
          const m=(a+b)/2;
          const tx=cx+r*0.62*Math.cos(m), ty=cy+r*0.62*Math.sin(m);
          const lx=cx+r*0.88*Math.cos(m), ly=cy+r*0.88*Math.sin(m);
          return (
            <g key={sol.id} onClick={()=>!spinning&&onSelect(i)} style={{cursor:spinning?"default":"pointer"}}>
              <path d={`M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} Z`}
                fill={sol.color} stroke="#050015" strokeWidth="2.5" opacity="0.93"/>
              <line x1={cx} y1={cy} x2={x1} y2={y1} stroke="#050015" strokeWidth="1.5" opacity="0.5"/>
              <text x={tx} y={ty-11} textAnchor="middle" fontSize="26" dominantBaseline="middle">{sol.emoji}</text>
              <text x={tx} y={ty+13} textAnchor="middle" fontSize="11" fill="#1a0533" fontWeight="900"
                dominantBaseline="middle">{sol.label}</text>
              <text x={lx} y={ly} textAnchor="middle" fontSize="12" fill="white" fontWeight="900"
                dominantBaseline="middle">{sol.id}</text>
            </g>
          );
        })}

// breathing animation
function BreathingGuide({ active, color }) {
  const [phase, setPhase] = useState("inhale"); // inhale | hold | exhale
  const [count, setCount] = useState(4);

  useEffect(() => {
    if (!active) return;
    // breathing cycle: inhale 4s → hold 2s → exhale 4s
    const CYCLE = [
      {phase:"inhale", dur:4000, label:"שאפו...", count:4},
      {phase:"hold",   dur:2000, label:"עצרו...", count:2},
      {phase:"exhale", dur:4000, label:"נשפו...", count:4},
    ];
    let step=0, timer=null, countTimer=null;
    const runStep = () => {
      const s = CYCLE[step % CYCLE.length];
      setPhase(s.phase); setCount(s.count);
      // countdown
      let c=s.count;
      countTimer = setInterval(()=>{ c--; if(c>=0) setCount(c); }, s.dur/s.count);
      timer = setTimeout(()=>{ clearInterval(countTimer); step++; runStep(); }, s.dur);
    };
    runStep();
    return ()=>{ clearTimeout(timer); clearInterval(countTimer); };
  }, [active]);

  if (!active) return null;

  const isIn  = phase==="inhale";
  const isHold= phase==="hold";
  const scale = isIn ? 1.35 : isHold ? 1.25 : 1;
  const label = isIn ? "שאפו..." : isHold ? "עצרו..." : "נשפו...";

  return (
    <div className="flex flex-col items-center gap-3 my-2 w-full max-w-xs">
      {/* animated rings */}
      <div className="relative flex items-center justify-center" style={{width:140,height:140}}>
        {/* outer pulse ring */}
        <div className="absolute inset-0 rounded-full" style={{
          background:`${color}15`,
          border:`2px solid ${color}44`,
          animation: isIn?"breatheRing 4s ease-in-out infinite":"breatheRing 4s ease-in-out infinite reverse",
          animationPlayState: isHold?"paused":"running",
        }}/>
        {/* mid ring */}
        <div className="absolute rounded-full" style={{
          width:110,height:110,
          background:`${color}20`,
          border:`2px solid ${color}66`,
          transform:`scale(${isIn?1.1:0.95})`,
          transition:"transform 4s ease-in-out",
          boxShadow:`0 0 20px ${color}33`,
        }}/>
        {/* core circle */}
        <div className="rounded-full flex items-center justify-center relative overflow-hidden"
          style={{
            width:80,height:80,
            background:`linear-gradient(135deg,${color}55,${color}22)`,
            border:`3px solid ${color}`,
            transform:`scale(${scale})`,
            transition:`transform ${isIn?4:isHold?0.2:4}s ease-in-out`,
            boxShadow:`0 0 24px ${color}66, inset 0 0 16px ${color}33`,
          }}>
          <span style={{fontSize:32, animation:"breatheCore 4s ease-in-out infinite"}}>🫁</span>
        </div>
      </div>
      {/* phase label */}
      <div className="text-center">
        <div className="font-black text-xl" style={{color, fontFamily:"Heebo,sans-serif",
          animation:"breatheText 1s ease-in-out infinite"}}>
          {label}
        </div>
        {/* countdown dots */}
        <div className="flex gap-1.5 justify-center mt-1.5">
          {Array.from({length:4}).map((_,i)=>(
            <div key={i} className="rounded-full transition-all duration-500"
              style={{width:10,height:10,
                background: i<count ? color : color+"33",
                boxShadow: i<count ? `0 0 6px ${color}` : "none",
              }}/>
          ))}
        </div>
      </div>
    </div>
  );
}


// ── Per-solution visual animations ────────────────────────────────────────────
function SolutionAnim({ sol }) {
  const [step, setStep] = useState(0);

  useEffect(() => {
    const t = setInterval(() => setStep(s => s + 1), 800);
    return () => clearInterval(t);
  }, []);

  // id:1 נשימה — handled by BreathingGuide
  if (sol.id === 1) return null;

  // id:2 להתקרר — walking figure moving away
  if (sol.id === 2) return (
    <div className="flex flex-col items-center gap-2 my-2">
      <div className="relative w-full max-w-xs h-16 overflow-hidden rounded-2xl"
        style={{background:`${sol.color}15`,border:`1px solid ${sol.color}33`}}>
        <div className="absolute flex flex-col items-center"
          style={{
            right: `${10 + (step % 20) * 4}%`,
            top:"50%",
            transform:"translateY(-50%)",
            transition:"right 0.8s linear",
            fontSize:32,
            animation:"walkStep 0.8s ease-in-out infinite",
          }}>🚶</div>
        <div className="absolute right-3 top-1/2 -translate-y-1/2 text-lg opacity-40">➡️</div>
        <div className="absolute left-4 top-1/2 -translate-y-1/2 rounded-xl px-2 py-1 text-xs font-black"
          style={{background:`${sol.color}33`,color:sol.color,fontFamily:"Heebo,sans-serif"}}>פינה שקטה</div>
      </div>
    </div>
  );

  // id:3 לבקש עזרה — speech bubble pulsing
  if (sol.id === 3) return (
    <div className="flex items-center justify-center gap-3 my-2">
      <div className="text-4xl" style={{animation:"talkBubble 1.5s ease-in-out infinite"}}>🗣️</div>
      <div className="flex flex-col gap-1">
        {["אפשר", "לעזור?"].map((w,i)=>(
          <div key={i} className="rounded-full px-3 py-1 text-sm font-black"
            style={{background:`${sol.color}33`,color:sol.color,
              animation:`talkBubble 1.5s ease-in-out infinite`,
              animationDelay:`${i*0.3}s`,
              fontFamily:"Heebo,sans-serif"}}>
            {w}
          </div>
        ))}
      </div>
      <div className="text-4xl">👤</div>
    </div>
  );

  // id:4 לחכות — animated countdown timer
  if (sol.id === 4) {
    const num = 10 - (step % 11);
    return (
      <div className="flex flex-col items-center gap-2 my-2">
        <div className="rounded-full flex items-center justify-center font-black"
          style={{width:72,height:72,fontSize:32,
            background:`linear-gradient(135deg,${sol.color}44,${sol.color}11)`,
            border:`3px solid ${sol.color}`,
            boxShadow:`0 0 20px ${sol.color}44`,
            animation:"waitCount 1s ease-in-out",
            animationIterationCount:"infinite",
            color:sol.color,fontFamily:"Heebo,sans-serif"}}>
          {num}
        </div>
        <div className="flex gap-1">
          {Array.from({length:10}).map((_,i)=>(
            <div key={i} className="rounded-full transition-all duration-300"
              style={{width:8,height:8,
                background: (10-num)>i ? sol.color : sol.color+"33"}}/>
          ))}
        </div>
      </div>
    );
  }

  // id:5 להתפשר — handshake
  if (sol.id === 5) return (
    <div className="flex items-center justify-center gap-2 my-2">
      <div style={{fontSize:36,animation:"handshakeWiggle 0.8s ease-in-out infinite",
        animationDelay:"0s",display:"inline-block"}}>👤</div>
      <div style={{fontSize:40,animation:"handshakeWiggle 0.8s ease-in-out infinite",
        animationDelay:"0.1s",display:"inline-block"}}>🤝</div>
      <div style={{fontSize:36,animation:"handshakeWiggle 0.8s ease-in-out infinite",
        animationDelay:"0.2s",display:"inline-block"}}>👤</div>
    </div>
  );

  // id:6 להתעלם — fading away emoji
  if (sol.id === 6) return (
    <div className="flex items-center justify-center gap-3 my-2">
      <div style={{fontSize:36}}>😎</div>
      {["💢","😤","😠"].map((e,i)=>(
        <div key={i} style={{fontSize:28,
          animation:"fadeWave 2s ease-out infinite",
          animationDelay:`${i*0.4}s`,
          opacity:0}}>
          {e}
        </div>
      ))}
    </div>
  );

  // id:7 לדבר — chat bubbles
  if (sol.id === 7) return (
    <div className="flex flex-col gap-1.5 my-2 max-w-xs w-full">
      {[
        {text:"אני מרגיש...", align:"right", delay:0},
        {text:"אני מקשיב 💙", align:"left", delay:0.5},
      ].map((b,i)=>(
        <div key={i} className="rounded-2xl px-3 py-1.5 text-sm font-black"
          style={{
            background:`${sol.color}${i===0?"44":"22"}`,
            color: i===0 ? sol.color : "#fff",
            alignSelf: b.align==="right" ? "flex-end" : "flex-start",
            animation:"talkBubble 2s ease-in-out infinite",
            animationDelay:`${b.delay}s`,
            fontFamily:"Heebo,sans-serif",
            boxShadow:`0 2px 8px ${sol.color}33`,
          }}>
          {b.text}
        </div>
      ))}
    </div>
  );

  // id:8 לצחוק — bouncing laugh emojis
  if (sol.id === 8) return (
    <div className="flex justify-center gap-2 my-2">
      {["😂","🤣","😄","😁"].map((e,i)=>(
        <div key={i} style={{fontSize:32,
          animation:"laughBounce 0.6s ease-in-out infinite",
          animationDelay:`${i*0.12}s`,
          display:"inline-block"}}>
          {e}
        </div>
      ))}
    </div>
  );

  return null;
}

// 🎙️ NARRATOR ENGINE — Web Speech API (Hebrew)
// ═══════════════════════════════════════════════════════════════════════════

function useNarrator() {
  const speaking = useRef(false);
  const queue = useRef([]);
  const enabled = useRef(true);

  // find best Hebrew voice — prefer Carmit (iOS) for natural sound
  const getVoice = () => {
    const voices = window.speechSynthesis?.getVoices() || [];
    // iOS: Carmit is the best Hebrew voice — natural and clear
    return (
      voices.find(v => v.name === "Carmit") ||
      voices.find(v => v.name?.includes("Carmit")) ||
      voices.find(v => v.lang === "he-IL" && v.localService) ||
      voices.find(v => v.lang === "he-IL") ||
      voices.find(v => v.lang?.startsWith("he")) ||
      null
    );
  };

  const processQueue = () => {
    if (!enabled.current || speaking.current || queue.current.length === 0) return;
    const text = queue.current.shift();
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = "he-IL";
    utt.rate = 0.82;   // slow and clear for kids
    utt.pitch = 1.0;   // natural pitch
    utt.volume = 1;
    const v = getVoice();
    if (v) utt.voice = v;
    utt.onstart = () => { speaking.current = true; };
    utt.onend = () => { speaking.current = false; setTimeout(processQueue, 120); };
    utt.onerror = () => { speaking.current = false; setTimeout(processQueue, 120); };
    window.speechSynthesis.speak(utt);
  };

  const say = (text, { priority = false } = {}) => {
    if (!text || !enabled.current) return;
    if (priority) {
      window.speechSynthesis?.cancel();
      speaking.current = false;
      queue.current = [text];
    } else {
      queue.current.push(text);
    }
    processQueue();
  };

  const stop = () => {
    window.speechSynthesis?.cancel();
    speaking.current = false;
    queue.current = [];
  };

  const toggle = () => {
    enabled.current = !enabled.current;
    if (!enabled.current) stop();
    return enabled.current;
  };

  // preload voices (Chrome lazy-loads them)
  useEffect(() => {
    const load = () => window.speechSynthesis?.getVoices();
    load();
    window.speechSynthesis?.addEventListener("voiceschanged", load);
    return () => {
      window.speechSynthesis?.removeEventListener("voiceschanged", load);
      stop();
    };
  }, []);

  return { say, stop, toggle, isEnabled: () => enabled.current };
}

// speaker button shown in header
function SpeakerBtn({ narrator, onRepeat, accent }) {
  const [on, setOn] = useState(true);
  return (
    <div className="flex gap-2">
      <button onClick={onRepeat}
        className="rounded-full w-9 h-9 flex items-center justify-center border active:scale-90 transition-all"
        style={{background:accent+"22",borderColor:accent+"55",fontSize:18}}
        title="שמע שוב">
        🔁
      </button>
      <button onClick={()=>{ const v=narrator.toggle(); setOn(v); }}
        className="rounded-full w-9 h-9 flex items-center justify-center border active:scale-90 transition-all"
        style={{background:on?"#00880022":"#55000022", borderColor:on?"#00CC66":"#FF4444", fontSize:18}}
        title={on?"השתק קריין":"הפעל קריין"}>
        {on?"🔊":"🔇"}
      </button>
    </div>
  );
}

// ─── main WheelZone component ─────────────────────────────────────────────────
function WheelZone({ hero, save, onSave, onBack }) {
  const [phase, setPhase] = useState("emotion"); // emotion | happy | spin | result | reflect
  const [emotionBefore, setEmotionBefore] = useState(null);
  const [sol, setSol] = useState(null);
  const [feelAfter, setFeelAfter] = useState(null);
  const [spinning, setSpinning] = useState(false);
  const [spinDeg, setSpinDeg] = useState(0);
  const [actSpinDeg, setActSpinDeg] = useState(0);
  const [actSpinning, setActSpinning] = useState(false);
  const [chosenActivity, setChosenActivity] = useState(null);
  const [showConfetti, setShowConfetti] = useState(false);
  const [showXP, setShowXP] = useState(false);
  const [showBreathing, setShowBreathing] = useState(false);
  const [streakMsg, setStreakMsg] = useState(null);
  const baseRot = useRef(0);
  const actBaseRot = useRef(0);
  const narrator = useNarrator();

  // ── narrator texts (clean, no emoji) ──
  const BUBBLE_TEXTS = {
    emotion:  "היי דור! איך אתה מרגיש עכשיו?",
    spinReady:(emo) => `דור, אתה מרגיש ${emo}? בוא נמצא פתרון!`,
    spinning: "הגלגל מסתובב... נחכה לפתרון",
    result:   (s)  => `הפתרון הוא: ${s.label}. ${s.desc}`,
    askAfter: "איך הרגשת אחרי?",
    good:     (s)  => `כל הכבוד דור! השתמשת ב${s.power}! אתה גיבור אמיתי!`,
    ok:       "ניסית וזה מה שחשוב! כל הכבוד דור!",
    hard:     "לא נורא דור, יש עוד פתרונות. נסה שוב!",
    streak:   "שלושה פתרונות ברצף! אלוף!",
    breathe:  "בוא ננשום ביחד. שאפו לאט... עצרו... ונשפו. שוב.",
  };

  // bubble display text (with emoji for screen)
  const bubbleText = () => {
    if (phase==="emotion") return "היי דור! איך אתה מרגיש עכשיו?";
    if (phase==="happy" && !chosenActivity) return "דור שמח! 😊 בוא נבחר פעילות כיפית! 🎉";
    if (phase==="happy" && chosenActivity) return `בחרת ${chosenActivity.label}! כיף! 🎉 תהנה!`;
    if (phase==="spin" && !spinning) return `דור, ${emotionBefore?.label}? בוא נמצא פתרון! 💪`;
    if (phase==="spin" && spinning) return "הגלגל מחפש פתרון... 🌀";
    if (phase==="result") return `הפתרון: ${sol?.label}! ${sol?.desc} 💥`;
    if (phase==="reflect") {
      if (feelAfter==="😊") return `כל הכבוד דור! השתמשת ב${sol?.power}! גיבור אמיתי! 🌟`;
      if (feelAfter==="😐") return "ניסית וזה מה שחשוב! 💪 פעם הבאה ננסה שוב!";
      return "לא נורא דור, יש עוד פתרונות! 🤗 נסה שוב?";
    }
    return "";
  };

  // auto-narrate when phase or sol changes
  useEffect(() => {
    if (phase==="emotion") narrator.say(BUBBLE_TEXTS.emotion, {priority:true});
    if (phase==="spin" && !spinning && emotionBefore)
      narrator.say(BUBBLE_TEXTS.spinReady(emotionBefore.label), {priority:true});
  }, [phase]);

  useEffect(() => {
    if (phase==="result" && sol) {
      narrator.say(BUBBLE_TEXTS.result(sol), {priority:true});
      setTimeout(()=> narrator.say(BUBBLE_TEXTS.askAfter), 2800);
      if (sol.id===1) setTimeout(()=> narrator.say(BUBBLE_TEXTS.breathe), 5000);
    }
  }, [sol]);

  const doSpin = () => {
    if (spinning) return;
    setSpinning(true); setSol(null);
    narrator.say(BUBBLE_TEXTS.spinning, {priority:true});
    const idx = Math.floor(Math.random()*SOLUTIONS.length);
    const extraSpins = 5 + Math.floor(Math.random()*3);
    const targetAngle = extraSpins*360 + idx*(360/SOLUTIONS.length);
    baseRot.current += targetAngle;
    setSpinDeg(baseRot.current);
    setTimeout(()=>{
      setSpinning(false);
      setSol(SOLUTIONS[idx]);
      setPhase("result");
      boom();
    }, 2700);
  };

  const doSelectSlice = (idx) => {
    if (spinning) return;
    // narrate the label immediately on tap
    narrator.say(SOLUTIONS[idx].label, {priority:true});
    const extraSpins = 2;
    const targetAngle = extraSpins*360 + idx*(360/SOLUTIONS.length);
    baseRot.current += targetAngle;
    setSpinDeg(baseRot.current);
    setTimeout(()=>{
      setSol(SOLUTIONS[idx]);
      setPhase("result");
      boom();
    }, 500);
  };

  const boom = () => {
    setShowConfetti(true);
    setTimeout(()=>setShowConfetti(false), 2000);
  };

  const doFeelAfter = (e) => {
    setFeelAfter(e.emoji);
    setPhase("reflect");
    // narrate feeling + response
    narrator.say(e.label, {priority:true});
    if (sol?.id===1) setShowBreathing(true);
    // earn XP
    const earned = e.emoji==="😊" ? sol.xp+5 : sol.xp;
    const newXP = (save.xp||0) + earned;
    const newHistory = [...(save.history||[]), {
      ...sol, feelAfter:e.emoji,
      emotion:emotionBefore?.label,
      time:new Date().toLocaleTimeString("he-IL"),
    }];
    const streak = (save.wheel_streak||0)+1;
    if (streak===3) {
      setStreakMsg("🔥 3 פתרונות ברצף! +10 XP בונוס!");
      setTimeout(()=> narrator.say(BUBBLE_TEXTS.streak), 1200);
    }
    const bonusXP = streak===3 ? 10 : 0;
    const newStars = Math.min(5,(save.zone_stars?.wheel||0)+1);
    onSave({
      ...save, xp: newXP+bonusXP,
      history: newHistory,
      wheel_streak: streak,
      zone_stars: {...save.zone_stars, wheel:newStars},
    });
    setShowXP(true);
    setTimeout(()=>setShowXP(false), 1800);
    // delayed praise
    setTimeout(()=>{
      if (e.emoji==="😊") narrator.say(BUBBLE_TEXTS.good(sol));
      else if (e.emoji==="😐") narrator.say(BUBBLE_TEXTS.ok);
      else narrator.say(BUBBLE_TEXTS.hard);
    }, 900);
  };

  const reset = () => {
    narrator.stop();
    setSol(null); setFeelAfter(null); setPhase("emotion");
    setEmotionBefore(null); setShowBreathing(false); setStreakMsg(null);
    setChosenActivity(null); setActSpinning(false); setActSpinDeg(0);
  };

  // Activity wheel spin
  const doActSpin = () => {
    if (actSpinning) return;
    setActSpinning(true);
    const idx = Math.floor(Math.random()*HAPPY_ACTIVITIES.length);
    const deg = (5+Math.floor(Math.random()*3))*360 + idx*(360/HAPPY_ACTIVITIES.length);
    actBaseRot.current += deg;
    setActSpinDeg(actBaseRot.current);
    narrator.say("הגלגל מסתובב!", {priority:true});
    setTimeout(()=>{
      setActSpinning(false);
      setChosenActivity(HAPPY_ACTIVITIES[idx]);
      boom();
      narrator.say(`${HAPPY_ACTIVITIES[idx].label}! כיף! תהנה!`, {priority:true});
    }, 2400);
  };

  const doActSelect = (idx) => {
    if (actSpinning) return;
    const act = HAPPY_ACTIVITIES[idx];
    narrator.say(act.label, {priority:true});
    const deg = 2*360 + idx*(360/HAPPY_ACTIVITIES.length);
    actBaseRot.current += deg;
    setActSpinDeg(actBaseRot.current);
    setTimeout(()=>{
      setChosenActivity(act);
      boom();
      narrator.say(`${act.label}! כיף! תהנה!`, {priority:true});
    }, 500);
  };

  const wheelStars = save.zone_stars?.wheel||0;
  const streak = save.wheel_streak||0;

  return (
    <div className="min-h-screen flex flex-col" dir="rtl"
      style={{background:"linear-gradient(180deg,#0a0015 0%,#050010 100%)"}}>
      <Confetti active={showConfetti}/>
      {showXP && <XPToast xp={sol?.xp||15} accent={hero.accent}/>}

      {/* header */}
      <div className="flex items-center justify-between px-4 pt-4 pb-2">
        <button onClick={()=>{ narrator.stop(); onBack(); }}
          className="rounded-full px-4 py-2 text-sm font-black border active:scale-95 transition-all"
          style={{background:"#ffffff08",borderColor:hero.accent+"44",color:hero.accent}}>
          🏠 בית
        </button>
        <div className="text-center">
          <div className="text-white font-black" style={{textShadow:`0 0 10px ${hero.accent}`}}>
            🎡 גלגל הפתרונות
          </div>
          <div className="flex items-center justify-center gap-2 mt-0.5">
            <Stars n={wheelStars} max={5} size={12}/>
            {streak>0 && <span className="text-xs font-black" style={{color:hero.accent}}>🔥{streak}</span>}
          </div>
        </div>
        <SpeakerBtn narrator={narrator} accent={hero.accent}
          onRepeat={()=> narrator.say(bubbleText().replace(/[🎡💪🌀💥🌟💪🤗🔄🏠⭐🔥⚡💡]/gu,""), {priority:true})}/>
      </div>

      {/* speech bubble */}
      <div className="px-4 mb-3">
        <div className="relative rounded-2xl px-4 py-3 border-2 text-right"
          style={{background:"#ffffff0d",borderColor:hero.accent+"44",
            boxShadow:`0 2px 16px ${hero.glow}22`}}>
          <p className="text-white font-black text-base leading-snug">{bubbleText()}</p>
          <div style={{
            position:"absolute",bottom:-10,right:20,width:0,height:0,
            borderLeft:"10px solid transparent",borderRight:"10px solid transparent",
            borderTop:`10px solid ${hero.accent}44`,
          }}/>
        </div>
      </div>

      {/* ── PHASE: emotion ── */}
      {phase==="emotion" && (
        <div className="flex-1 flex flex-col items-center px-4">
          <div className="text-5xl mb-5 mt-1"
            style={{filter:`drop-shadow(0 0 16px ${hero.glow})`,animation:"heroFloat 3s ease-in-out infinite"}}>
            {hero.emoji}
          </div>
          <div className="grid grid-cols-2 gap-3 w-full max-w-sm">
            {EMOTIONS_BEFORE.map(e=>(
              <EmotionBtn key={e.emoji} emotion={e} size="lg"
                onClick={()=>{
                  narrator.say(e.label, {priority:true});
                  setEmotionBefore(e);
                  if (e.happy) {
                    setPhase("happy");
                    setTimeout(()=> narrator.say("דור שמח! בוא נבחר פעילות כיפית!", {priority:true}), 600);
                  } else {
                    setPhase("spin");
                    setTimeout(()=> narrator.say(BUBBLE_TEXTS.spinReady(e.label)), 700);
                  }
                }}/>
            ))}
          </div>
        </div>
      )}

      {/* ── PHASE: happy — activity wheel ── */}
      {phase==="happy" && !chosenActivity && (
        <div className="flex-1 flex flex-col items-center px-2 pb-4">
          <div className="mb-2 text-center">
            <span className="text-5xl" style={{animation:"heroFloat 2s ease-in-out infinite"}}>😊</span>
          </div>
          {/* activity wheel SVG */}
          <div className="relative flex items-center justify-center select-none" style={{width:300,height:300}}>
            <div className="absolute inset-0 rounded-full"
              style={{boxShadow:"0 0 40px #FFD70055"}}/>
            <svg width={300} height={300} style={{
              transform:`rotate(${actSpinDeg}deg)`,
              transition:actSpinning?"transform 2.4s cubic-bezier(0.25,0.1,0.1,1)":"none",
              filter:"drop-shadow(0 0 10px #FFD70066)",
            }}>
              {HAPPY_ACTIVITIES.map((act,i)=>{
                const n=HAPPY_ACTIVITIES.length, cx=150, cy=150, r=128;
                const a=(2*Math.PI*i)/n-Math.PI/2, b=(2*Math.PI*(i+1))/n-Math.PI/2;
                const x1=cx+r*Math.cos(a),y1=cy+r*Math.sin(a);
                const x2=cx+r*Math.cos(b),y2=cy+r*Math.sin(b);
                const m=(a+b)/2;
                const tx=cx+r*0.62*Math.cos(m),ty=cy+r*0.62*Math.sin(m);
                return (
                  <g key={act.id} onClick={()=>!actSpinning&&doActSelect(i)} style={{cursor:actSpinning?"default":"pointer"}}>
                    <path d={`M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} Z`}
                      fill={act.color} stroke="#050015" strokeWidth="2.5" opacity="0.93"/>
                    <text x={tx} y={ty-8} textAnchor="middle" fontSize="22" dominantBaseline="middle">{act.emoji}</text>
                    <text x={tx} y={ty+11} textAnchor="middle" fontSize="8" fill="#1a0533" fontWeight="900"
                      dominantBaseline="middle">{act.label}</text>
                  </g>
                );
              })}
              <circle cx={150} cy={150} r={38} fill="#050015" stroke="#FFD700" strokeWidth="4"/>
              <text x={150} y={150} textAnchor="middle" dominantBaseline="middle" fontSize="22">😊</text>
            </svg>
            <div className="absolute top-0 left-1/2 z-20"
              style={{transform:"translateX(-50%) translateY(-2px)"}}>
              <div style={{width:0,height:0,borderLeft:"11px solid transparent",
                borderRight:"11px solid transparent",borderTop:"22px solid #FFD700",
                filter:"drop-shadow(0 0 6px #FFD700)"}}/>
            </div>
          </div>
          <button onClick={doActSpin} disabled={actSpinning}
            className="mt-5 px-12 py-4 rounded-full font-black text-2xl text-black active:scale-95 transition-all disabled:opacity-40"
            style={{background:actSpinning?"#444":"linear-gradient(135deg,#FFD700,#FF8C00)",
              boxShadow:actSpinning?"none":"0 0 32px #FFD70088"}}>
            {actSpinning?"⏳ מסתובב...":"🌀 סובב!"}
          </button>
          <p className="text-gray-500 text-xs mt-2 font-bold">או לחץ ישירות על הגלגל</p>
        </div>
      )}

      {phase==="happy" && chosenActivity && (
        <div className="flex-1 flex flex-col items-center justify-center px-4 pb-8 gap-5">
          <div className="text-8xl" style={{animation:"heroFloat 2s ease-in-out infinite",
            filter:`drop-shadow(0 0 20px ${chosenActivity.color})`}}>
            {chosenActivity.emoji}
          </div>
          <div className="w-full max-w-sm rounded-3xl p-6 border-4 text-center"
            style={{background:`linear-gradient(135deg,${chosenActivity.color}22,#050015)`,
              borderColor:chosenActivity.color,boxShadow:`0 0 30px ${chosenActivity.color}55`}}>

          </button>
        </div>
      )}


    </div>
  );
}

function KingdomWheelSVG({ hero, onSelect, spinning, spinDeg, compact=false }) {
  const S=compact?240:300, cx=S/2, cy=S/2, r=compact?100:128, n=SOLUTIONS.length;
  return (
    <div className="relative flex items-center justify-center select-none" style={{width:S,height:S}}>
      <div className="absolute inset-0 rounded-full"
        style={{boxShadow:`0 0 30px ${hero.glow}44`}}/>
      <svg width={S} height={S} style={{
        transform:`rotate(${spinDeg}deg)`,
        transition:spinning?"transform 2.4s cubic-bezier(0.25,0.1,0.1,1)":"none",
        filter:`drop-shadow(0 0 8px ${hero.glow}44)`,
      }}>
        <circle cx={cx} cy={cy} r={r+3} fill="none" stroke={hero.accent} strokeWidth="2" opacity="0.4"/>
        {SOLUTIONS.map((sol,i)=>{
          const a=(2*Math.PI*i)/n-Math.PI/2, b=(2*Math.PI*(i+1))/n-Math.PI/2;
          const x1=cx+r*Math.cos(a),y1=cy+r*Math.sin(a);
          const x2=cx+r*Math.cos(b),y2=cy+r*Math.sin(b);
          const m=(a+b)/2;
          const tx=cx+r*0.62*Math.cos(m),ty=cy+r*0.62*Math.sin(m);
          return (
            <g key={sol.id} onClick={()=>!spinning&&onSelect(i)} style={{cursor:spinning?"default":"pointer"}}>
              <path d={`M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} Z`}
                fill={sol.color} stroke="#050015" strokeWidth="2" opacity="0.93"/>
              <text x={tx} y={ty-7} textAnchor="middle" fontSize={compact?16:18} dominantBaseline="middle">{sol.emoji}</text>
              <text x={tx} y={ty+9} textAnchor="middle" fontSize={compact?7:8} fill="#1a0533" fontWeight="900"
                dominantBaseline="middle">{sol.label}</text>
            </g>
          );
        })}
        <circle cx={cx} cy={cy} r={compact?30:36} fill="#050015" stroke={hero.accent} strokeWidth="3"/>
        <text x={cx} y={cy} textAnchor="middle" dominantBaseline="middle" fontSize={compact?18:22}
          style={{filter:`drop-shadow(0 0 6px ${hero.glow})`}}>{hero.emoji}</text>
      </svg>
      <div className="absolute top-0 left-1/2 z-20 flex flex-col items-center"
        style={{transform:"translateX(-50%) translateY(-2px)"}}>
        <div style={{width:0,height:0,
          borderLeft:"9px solid transparent",borderRight:"9px solid transparent",
          borderTop:`18px solid ${hero.accent}`,
          filter:`drop-shadow(0 0 4px ${hero.glow})`}}/>
      </div>
    </div>
  );
}

function CastleSVG({ score, total, animate }) {
  const pct  = score / total;          // 0..1
  const gold = "#FFD700";
  const stone= "#8B9BB4";
  const dark = "#4A5568";
  const lit  = "#FFF9C4";

  // Parts reveal at score thresholds
  const show = {
    base:    pct >= 0,           // always
    walls:   pct >= 0.2,
    towers:  pct >= 0.4,
    gate:    pct >= 0.6,
    windows: pct >= 0.6,
    battlements: pct >= 0.8,
    flag:    pct >= 1.0,
  };

  const Part = ({visible, delay=0, children}) => visible ? (
    <g style={{animation:`stoneAppear 0.6s cubic-bezier(0.34,1.56,0.64,1) ${delay}s both`}}>
      {children}

    <svg viewBox="0 0 200 160" width="100%" style={{maxWidth:280,filter:"drop-shadow(0 8px 16px rgba(0,0,0,0.5))"}}>

          <stop offset="0%" stopColor="#9AA5B4"/>
          <stop offset="100%" stopColor="#6B7A8D"/>

      <rect width="200" height="160" fill="url(#skyKing)"/>

      <rect x="0" y="145" width="200" height="15" fill="#2d3748" rx="2"/>
      <rect x="0" y="143" width="200" height="4" fill="#FFD70033"/>

      {/* ── BASE ── */}
      <Part visible={show.base} delay={0}>
        <rect x="60" y="110" width="80" height="36" fill="url(#stoneGrad)" rx="2"/>

  const pickCard = (used=[]) => {
    const available = PROBLEM_CARDS.filter(c=>!used.includes(c.id));
    const pool = available.length>0 ? available : PROBLEM_CARDS;
    return pool[Math.floor(Math.random()*pool.length)];
  };

  const startGame = (m) => {
    setMode(m);
    const c = pickCard([]);
    setCard(c);
    setUsedCards([c.id]);
    setPhase("card");
    setTimeout(()=> narrator.say(`סיבוב 1. ${c.text}. מה הפתרון הירוק?`, {priority:true}), 300);
  };

  const doSpin = () => {
    if (spinning) return;
    setSpinning(true);
    narrator.say("הגלגל מסתובב!", {priority:true});
    const idx = Math.floor(Math.random()*SOLUTIONS.length);
    const deg = (5+Math.floor(Math.random()*3))*360 + idx*(360/SOLUTIONS.length);
    baseRot.current += deg;
    setSpinDeg(baseRot.current);
    setTimeout(()=>{ setSpinning(false); resolveChoice(SOLUTIONS[idx]); }, 2500);
  };

  const doSelectSlice = (idx) => {
    if (spinning) return;
    narrator.say(SOLUTIONS[idx].label, {priority:true});
    const deg = 2*360 + idx*(360/SOLUTIONS.length);
    baseRot.current += deg;
    setSpinDeg(baseRot.current);
    setTimeout(()=> resolveChoice(SOLUTIONS[idx]), 500);
  };

  const resolveChoice = (sol) => {
    setChosen(sol);
    const green = card.green.includes(sol.id);
    setIsGreen(green);
    setPhase("result");
    if (green) {
      setScore(s=>s+1);
      setShowConfetti(true);
      setTimeout(()=>setShowConfetti(false),2000);
      setCastleAnim(true);
      setTimeout(()=>setCastleAnim(false),800);
      narrator.say(`${sol.label} — פתרון ירוק! כל הכבוד דור! הטירה גדלה!`, {priority:true});
      const newStars = Math.min(5,(save.zone_stars?.kingdom||0)+1);
      onSave({...save, xp:(save.xp||0)+12,
        zone_stars:{...save.zone_stars,kingdom:newStars}});
    } else {
      narrator.say(`${sol.label}. בוא נחשוב — זה עוזר לכולם?`, {priority:true});
    }
  };

  const nextRound = () => {
    if (round >= KINGDOM_ROUNDS) { setPhase("summary"); narrator.say(summaryText(score+(isGreen?0:0)), {priority:true}); return; }
    const newUsed = [...usedCards];
    const c = pickCard(newUsed);
    newUsed.push(c.id);
    setUsedCards(newUsed);
    setCard(c); setChosen(null); setIsGreen(null);
    setRound(r=>r+1); setPhase("card");
    const nr = round+1;
    setTimeout(()=> narrator.say(`סיבוב ${nr}. ${c.text}. מה הפתרון הירוק?`, {priority:true}), 200);
  };

  const finalScore = score + (isGreen&&phase==="result"?0:0); // already counted in resolveChoice
  const summaryText = (s) => {
    if (s>=4) return `וואו! ${s} מתוך ${KINGDOM_ROUNDS} פתרונות ירוקים! אתה מלך הפתרונות!`;
    if (s>=2) return `יפה מאוד! ${s} פתרונות ירוקים! כל הכבוד דור!`;
    return `${s} פתרונות ירוקים. תרגול מעולה! בפעם הבאה תצליח יותר!`;
  };

  const restart = () => {
    setScore(0); setRound(1); setChosen(null); setIsGreen(null);
    setUsedCards([]); setPhase("mode"); setMode(null);
    narrator.stop();
  };

  // ── ROUND DOTS ──
  const RoundDots = () => (
    <div className="flex gap-1.5 justify-center my-2">
      {Array.from({length:KINGDOM_ROUNDS}).map((_,i)=>(
        <div key={i} className="rounded-full transition-all duration-300" style={{
          width:i===round-1?14:10, height:i===round-1?14:10,
          background: i<round-1 ? "#FFD700" : i===round-1 ? hero.accent : "#333",
          boxShadow: i===round-1 ? `0 0 8px ${hero.accent}` : "none",
        }}/>
      ))}
    </div>
  );

  return (
    <div className="min-h-screen flex flex-col" dir="rtl"
      style={{background:"linear-gradient(180deg,#1a1200 0%,#050015 100%)"}}>
      <Confetti active={showConfetti}/>

      {/* header */}
      <div className="flex items-center justify-between px-4 pt-4 pb-2">
        <button onClick={()=>{narrator.stop();onBack();}}
          className="rounded-full px-4 py-2 text-sm font-black border active:scale-95"
          style={{background:"#ffffff08",borderColor:"#FFD70044",color:"#FFD700"}}>
          🏠 בית
        </button>
        <div className="text-center">
          <div className="text-white font-black" style={{textShadow:"0 0 10px #FFD700"}}>
            👑 משחק הממלכה
          </div>
          <div className="flex items-center justify-center gap-1 mt-0.5">
            <Stars n={save.zone_stars?.kingdom||0} max={5} size={12}/>
          </div>
        </div>
        <SpeakerBtn narrator={narrator} accent="#FFD700"
          onRepeat={()=>{
            if (phase==="card"&&card) narrator.say(card.text,{priority:true});
            else if (phase==="result"&&chosen) narrator.say(isGreen?`פתרון ירוק! ${chosen.label}`:`${chosen.label} — נסה שוב`,{priority:true});
          }}/>
      </div>

      {/* ── MODE SELECT ── */}
      {phase==="mode" && (
        <div className="flex-1 flex flex-col items-center justify-center px-4 gap-4">
          {/* mini castle preview */}
          <div className="pop-in" style={{width:"100%",maxWidth:260}}>
            <CastleSVG score={0} total={KINGDOM_ROUNDS} animate={false}/>
          </div>
          <div className="relative bg-white rounded-2xl px-4 py-3 border-4 max-w-xs text-right pop-in"
            style={{borderColor:"#FFD700",animationDelay:"0.2s"}}>
            <p style={{color:"#1a1a1a",fontWeight:900,fontSize:17,fontFamily:"Heebo,sans-serif",lineHeight:1.4}}>
              דור! בנה את הטירה שלך — פתרון ירוק = חלק חדש בטירה! 🏰
            </p>
            <div className="absolute -bottom-4 right-6 w-0 h-0"
              style={{borderLeft:"14px solid transparent",borderRight:"14px solid transparent",borderTop:"14px solid #FFD700"}}/>
          </div>
          <div className="flex flex-col gap-3 w-full max-w-sm mt-2">
            {[
              {id:"solo",   emoji:"🦸", title:"לבד",      sub:"סובב גלגל או בחר פתרון",  border:"#FFD700"},
              {id:"parent", emoji:"👨‍👩‍👦", title:"עם הורה", sub:"שחקו ביחד ודברו",          border:"#A78BFA"},
            ].map((m,i)=>(
              <button key={m.id} onClick={()=>startGame(m.id)}
                className="btn-3d tap-ring rounded-3xl p-5 flex items-center gap-4 slide-up"
                style={{
                  background:`linear-gradient(145deg,${m.border}18,#06001e)`,
                  border:`2.5px solid ${m.border}66`,
                  boxShadow:`0 6px 20px ${m.border}22, 0 2px 0 ${m.border}44`,
                  animationDelay:`${0.3+i*0.1}s`,
                }}>
                <span style={{fontSize:46}}>{m.emoji}</span>
                <div className="text-right">
                  <div style={{color:"white",fontWeight:900,fontSize:20,fontFamily:"Heebo,sans-serif"}}>{m.title}</div>
                  <div style={{color:"#9ca3af",fontSize:13,fontFamily:"Heebo,sans-serif"}}>{m.sub}</div>
                </div>
              </button>
            ))}
          </div>
        </div>
      )}

      {/* ── CARD PHASE ── */}
      {phase==="card" && card && (
        <div className="flex-1 flex flex-col items-center px-3 pb-3">
          {/* castle progress strip */}
          <div className="w-full max-w-sm mb-1">
            <div className="flex items-center gap-2 mb-1 px-1">
              <span style={{fontSize:11,color:"#FFD700",fontWeight:900,fontFamily:"Heebo,sans-serif"}}>
                🏰 {score}/{KINGDOM_ROUNDS} אבני טירה
              </span>
              <div className="flex-1 rounded-full overflow-hidden" style={{height:6,background:"#ffffff11"}}>
                <div className="h-full rounded-full transition-all duration-700"
                  style={{width:`${(score/KINGDOM_ROUNDS)*100}%`,
                    background:"linear-gradient(90deg,#FFD700,#FF8C00)",
                    boxShadow:"0 0 8px #FFD70088"}}/>
              </div>
            </div>
          </div>
          <RoundDots/>
          {/* problem card */}
          <div className="w-full max-w-sm rounded-3xl p-4 border-2 mb-2 relative overflow-hidden slide-up"
            style={{background:"linear-gradient(145deg,#2d2500,#1a1000)",
              border:"2px solid #FFD70077",
              boxShadow:"0 0 28px rgba(255,215,0,0.3), inset 0 1px 0 rgba(255,215,0,0.1)"}}>
            <div className="absolute top-0 left-0 right-0 h-px"
              style={{background:"linear-gradient(90deg,transparent,#FFD700cc,transparent)"}}/>
            <div className="absolute -top-6 -left-6 w-24 h-24 rounded-full opacity-15 blur-2xl" style={{background:"#FFD700"}}/>
            <div className="relative text-center">
              <div style={{fontSize:56,marginBottom:10,animation:"heroFloat 2s ease-in-out infinite",display:"inline-block"}}>{card.emoji}</div>
              <div className="rounded-2xl px-4 py-3 mb-2"
                style={{background:"rgba(255,248,200,0.95)",boxShadow:"inset 0 2px 8px rgba(0,0,0,0.1)"}}>
                <p style={{color:"#1a1a1a",fontWeight:900,fontSize:19,lineHeight:1.35,fontFamily:"Heebo,sans-serif"}}>{card.text}</p>
              </div>
              <div className="flex items-center justify-center gap-2 flex-wrap">
                <span style={{fontSize:11,fontWeight:900,borderRadius:99,padding:"3px 10px",
                  background:"#FFD70022",color:"#FFD700",border:"1px solid #FFD70044",fontFamily:"Heebo,sans-serif"}}>
                  🃏 בעיה מהממלכה
                </span>
                {mode==="parent" && (
                  <span style={{fontSize:11,fontWeight:900,borderRadius:99,padding:"3px 10px",
                    background:"#A78BFA22",color:"#A78BFA",border:"1px solid #A78BFA44",fontFamily:"Heebo,sans-serif"}}>
                    👨‍👩‍👦 תחשבו ביחד
                  </span>
                )}
              </div>
            </div>
          </div>
          <p style={{color:"#6b7280",fontSize:11,fontWeight:700,marginBottom:6,fontFamily:"Heebo,sans-serif"}}>
            בחר פתרון ירוק — ותוסיף אבן לטירה! 🏰
          </p>
          <KingdomWheelSVG hero={hero} onSelect={doSelectSlice} spinning={spinning} spinDeg={spinDeg} compact={true}/>
          <button onClick={doSpin} disabled={spinning}
            className="btn-3d mt-3 px-10 py-3.5 rounded-full font-black text-xl text-black"
            style={{background:spinning?"#555":`linear-gradient(135deg,#FFD700,#FF8C00)`,
              boxShadow:spinning?"none":"0 6px 20px rgba(255,215,0,0.5), 0 2px 0 #CC8800",
              fontFamily:"Heebo,sans-serif"}}>
            {spinning?"⏳ מסתובב...":"🌀 סובב!"}
          </button>
        </div>
      )}

      {/* ── RESULT PHASE ── */}
      {phase==="result" && chosen && card && (
        <div className="flex-1 flex flex-col items-center px-4 pb-4 gap-3">
          <RoundDots/>

          {/* castle — grows with score */}
          <div className="w-full flex justify-center" style={{
            animation: isGreen&&castleAnim?"castleRise 0.5s cubic-bezier(0.34,1.56,0.64,1)":"none"
          }}>
            <CastleSVG score={score} total={KINGDOM_ROUNDS} animate={isGreen}/>
          </div>

          {/* result card */}
          <div className="w-full max-w-sm rounded-3xl p-4 border-2 text-center relative overflow-hidden pop-in"
            style={{
              background: isGreen?"linear-gradient(145deg,#003d1a,#001a0a)":"linear-gradient(145deg,#2d1800,#1a0a00)",
              border:`2px solid ${isGreen?"#00CC66":"#FF8C00"}`,
              boxShadow: isGreen?"0 0 32px #00CC6655, 0 4px 0 #006633":"0 0 20px #FF8C0033",
            }}>
            <div className="absolute top-0 left-0 right-0 h-px"
              style={{background:isGreen?"linear-gradient(90deg,transparent,#00FF88cc,transparent)":"none"}}/>
            <div className="relative">
              <div style={{fontSize:44,marginBottom:4,display:"inline-block",
                animation:isGreen?"laughBounce 0.8s ease-in-out infinite":"none"}}>
                {isGreen?"✅":"🔄"}
              </div>
              <div style={{fontWeight:900,fontSize:22,marginBottom:4,fontFamily:"Heebo,sans-serif",
                color:isGreen?"#00FF88":"#FFB347",
                textShadow:isGreen?"0 0 12px #00FF8866":"none"}}>
                {isGreen?"פתרון ירוק! 🏰":"ננסה שוב! 💪"}
              </div>
              <div className="flex items-center justify-center gap-2 mb-2">
                <span style={{fontSize:24}}>{chosen.emoji}</span>
                <span style={{color:"white",fontWeight:900,fontSize:18,fontFamily:"Heebo,sans-serif"}}>{chosen.label}</span>
              </div>
              {isGreen
                ? <div className="rounded-2xl px-3 py-2"
                    style={{background:"#00CC6622",color:"#00FF88",fontSize:13,fontWeight:700,
                      border:"1px solid #00CC6644",fontFamily:"Heebo,sans-serif"}}>
                    {chosen.desc} 💚 +12 ⚡ אבן חדשה בטירה!
                  </div>
                : <div className="rounded-2xl px-3 py-2"
                    style={{background:"#FF8C0022",color:"#FFB347",fontSize:13,fontWeight:700,
                      border:"1px solid #FF8C0044",fontFamily:"Heebo,sans-serif"}}>
                    פתרון ירוק עוזר לך ולאחרים 💛
                  </div>
              }
            </div>
          </div>

          {/* hero speech bubble */}
          <div className="relative bg-white rounded-2xl px-4 py-3 max-w-xs text-right slide-up"
            style={{border:`3px solid ${isGreen?"#00CC66":"#FFD700"}`,
              boxShadow:`0 4px 16px ${isGreen?"#00CC6644":"#FFD70033"}`}}>
            <p style={{color:"#1a1a1a",fontWeight:900,fontSize:14,lineHeight:1.4,fontFamily:"Heebo,sans-serif"}}>
              {isGreen
                ? `${chosen.label} — זה ${chosen.power}! אתה גיבור אמיתי! 🌟`
                : `בוא נחשוב — האם ${chosen.label} עוזר לכולם? 🤔`}
            </p>
          </div>

          {/* parent hint */}
          {mode==="parent" && !isGreen && (
            <div className="w-full max-w-sm rounded-2xl p-3 border text-right"
              style={{background:"#A78BFA11",borderColor:"#A78BFA44"}}>
              <p style={{color:"#c4b5fd",fontWeight:900,fontSize:13,marginBottom:4,fontFamily:"Heebo,sans-serif"}}>💬 שאלה להורה ולדור:</p>
              <p style={{color:"white",fontSize:13,fontWeight:700,fontFamily:"Heebo,sans-serif"}}>מה חשבת שיעזור? למה?</p>
              <p style={{color:"#6b7280",fontSize:11,marginTop:4,fontFamily:"Heebo,sans-serif"}}>
                פתרונות ירוקים: {card.green.map(id=>SOLUTIONS.find(s=>s.id===id)?.emoji).join(" ")}
              </p>
            </div>
          )}

          <button onClick={nextRound}
            className="btn-3d px-10 py-4 rounded-full font-black text-xl text-black"
            style={{background:"linear-gradient(135deg,#FFD700,#FF8C00)",
              boxShadow:"0 6px 20px rgba(255,215,0,0.5), 0 2px 0 #CC8800",
              fontFamily:"Heebo,sans-serif"}}>
            {round>=KINGDOM_ROUNDS?"🏆 לסיכום!":`סיבוב ${round+1} ▶`}
          </button>
        </div>
      )}

      {/* ── SUMMARY ── */}
      {phase==="summary" && (
        <div className="flex-1 flex flex-col items-center px-4 pb-6 gap-4" style={{paddingTop:8}}>
          {/* full castle display */}
          <div className="w-full" style={{maxWidth:320,animation:"castleRise 0.8s cubic-bezier(0.34,1.56,0.64,1)"}}>
            <CastleSVG score={score} total={KINGDOM_ROUNDS} animate={true}/>
          </div>

          {/* score card */}
          <div className="w-full max-w-sm rounded-3xl p-5 border-2 text-center relative overflow-hidden pop-in"
            style={{background:"linear-gradient(145deg,#2d2500,#1a1000)",
              border:"2px solid #FFD70099",
              boxShadow:"0 0 32px rgba(255,215,0,0.4), inset 0 1px 0 rgba(255,215,0,0.1)"}}>
            <div className="absolute top-0 left-0 right-0 h-px"
              style={{background:"linear-gradient(90deg,transparent,#FFD700cc,transparent)"}}/>
            <div style={{fontSize:48,marginBottom:4,display:"inline-block",
              animation:score>=4?"laughBounce 0.8s ease-in-out infinite":"heroFloat 2s ease-in-out infinite"}}>
              {score>=4?"👑":score>=2?"🌟":"💪"}
            </div>
            <div style={{color:"white",fontWeight:900,fontSize:22,fontFamily:"Heebo,sans-serif",marginBottom:4}}>
              {score>=4?"מלך הפתרונות!":score>=2?"גיבור ירוק!":"כל הכבוד שניסית!"}
            </div>
            <div style={{fontWeight:900,fontSize:44,fontFamily:"Heebo,sans-serif",
              color:"#FFD700",textShadow:"0 0 24px #FFD700aa",marginBottom:8}}>
              {score}/{KINGDOM_ROUNDS}
            </div>
            <Stars n={Math.round((score/KINGDOM_ROUNDS)*5)} max={5} size={24}/>
            <div style={{marginTop:8,color:"#9ca3af",fontSize:13,fontFamily:"Heebo,sans-serif"}}>
              {summaryText(score)}
            </div>
          </div>

          <div className="flex gap-3 slide-up" style={{animationDelay:"0.4s"}}>
            <button onClick={restart}
              className="btn-3d px-7 py-3 rounded-full font-black text-lg text-black"
              style={{background:"linear-gradient(135deg,#FFD700,#FF8C00)",
                boxShadow:"0 6px 16px rgba(255,215,0,0.45), 0 2px 0 #CC8800",
                fontFamily:"Heebo,sans-serif"}}>
              🔄 שחק שוב
            </button>
            <button onClick={()=>{narrator.stop();onBack();}}
              className="btn-3d px-7 py-3 rounded-full font-black text-lg"
              style={{background:"linear-gradient(145deg,#2d2500,#1a1000)",
                border:"2px solid #FFD70066",color:"#FFD700",
                boxShadow:"0 4px 12px rgba(255,215,0,0.2)",
                fontFamily:"Heebo,sans-serif"}}>
              🏠 בית
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// shuffle helper
function shuffleArr(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// ── AnswerBtn — big tap target with correct/wrong animations ──
function AnswerBtn({ label, sublabel, onClick, state, accentColor }) {
  // state: "idle" | "correct" | "wrong"
  const bg = state==="correct" ? "linear-gradient(135deg,#00AA44,#00CC66)"
           : state==="wrong"   ? "linear-gradient(135deg,#CC2200,#FF4444)"
           : `linear-gradient(135deg,${accentColor}22,${accentColor}11)`;
  const border = state==="correct" ? "#00FF88"
               : state==="wrong"   ? "#FF4444"
               : accentColor+"55";
  const shake = state==="wrong" ? "wrongShake 0.5s ease" : "none";
  const scale = state==="correct" ? "correctPop 0.4s ease" : "none";

  return (
    <button onClick={onClick}
      className="rounded-3xl flex flex-col items-center justify-center active:scale-90 transition-colors border-4 relative overflow-hidden"
      style={{
        background:bg, borderColor:border,
        minHeight:90, padding:"12px 8px",
        animation: state==="wrong" ? shake : state==="correct" ? scale : "none",
        boxShadow: state==="correct" ? `0 0 24px #00FF8888`
                 : state==="wrong"   ? `0 0 16px #FF444488`
                 : `0 4px 16px ${accentColor}22`,
      }}>
      {/* sparkles on correct */}
      {state==="correct" && (
        <div className="absolute inset-0 pointer-events-none flex items-center justify-center"
          style={{fontSize:28,animation:"sparkleOut 0.6s ease forwards"}}>✨</div>
      )}
      <span className="font-black text-white leading-none" style={{fontSize:42}}>{label}</span>
      {sublabel && <span className="text-white font-bold mt-1 opacity-80" style={{fontSize:13}}>{sublabel}</span>}
    </button>
  );
}

// ── Game 1: שמע וגע — hear a letter/number and tap it ──
function HearAndTapGame({ hero, narrator, onScore, onDone, mode }) {
  const data = mode==="letters" ? LETTER_DATA : NUMBER_DATA;
  const ROUNDS = 8;
  const [round, setRound]     = useState(0);
  const [score, setScore]     = useState(0);
  const [options, setOptions] = useState([]);
  const [target, setTarget]   = useState(null);
  const [states, setStates]   = useState({});   // {idx: "correct"|"wrong"}
  const [locked, setLocked]   = useState(false);
  const [showBoom, setShowBoom] = useState(false);

  const makeRound = (rnd) => {
    const pool = shuffleArr(data).slice(0,4);
    const tgt  = pool[Math.floor(Math.random()*4)];
    setOptions(pool); setTarget(tgt); setStates({}); setLocked(false);
    // announce
    const txt = mode==="letters"
      ? `מצא את האות ${tgt.letter}! ${tgt.letter} כמו ${tgt.word}`
      : `מצא את המספר ${tgt.number}! ${tgt.word}`;
    setTimeout(()=> narrator.say(txt,{priority:true}), 200);
  };

  useEffect(()=>{ makeRound(0); },[]); // eslint-disable-line

  const choose = (idx, item) => {
    if (locked) return;
    const isLabel = mode==="letters" ? item.letter===target.letter : item.number===target.number;
    // read it aloud
    narrator.say(mode==="letters" ? item.letter : String(item.number), {priority:true});
    if (isLabel) {
      setStates({[idx]:"correct"});
      setLocked(true);
      setShowBoom(true);
      setTimeout(()=>setShowBoom(false),1500);
      const ns = score+1;
      setScore(ns);
      onScore(ns);
      narrator.say(mode==="letters"
        ? `כן! ${item.letter} כמו ${item.word}! מעולה!`
        : `כן! ${item.number}! ${item.word}! מעולה!`, {priority:false});
      setTimeout(()=>{
        if (round+1>=ROUNDS) onDone(ns);
        else { setRound(r=>r+1); makeRound(round+1); }
      },1400);
    } else {
      setStates(s=>({...s,[idx]:"wrong"}));
      narrator.say("לא זו! נסה שוב!", {priority:true});
      setTimeout(()=> setStates(s=>{const n={...s};delete n[idx];return n;}), 700);
    }
  };

  if (!target) return null;

  return (
    <div className="flex-1 flex flex-col items-center px-4 pb-4">
      {/* round progress */}
      <div className="flex gap-1.5 justify-center mb-3">
        {Array.from({length:ROUNDS}).map((_,i)=>(
          <div key={i} className="rounded-full transition-all" style={{
            width:i===round?14:10, height:i===round?14:10,
            background:i<round?"#FFD700":i===round?ZONE_COLOR:"#333",
            boxShadow:i===round?`0 0 8px ${ZONE_COLOR}`:"none",
          }}/>
        ))}
      </div>

      {/* big target display */}
      <div className="w-full max-w-sm rounded-3xl p-5 mb-4 border-2 text-center relative overflow-hidden"
        style={{background:`linear-gradient(135deg,${ZONE_COLOR}22,#050015)`,borderColor:ZONE_COLOR+"55"}}>
        {showBoom && (
          <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-10"
            style={{fontSize:60,animation:"sparkleOut 1s ease forwards"}}>🎉</div>
        )}
        <p className="text-gray-300 font-black text-sm mb-2">
          {mode==="letters" ? "🎵 מצא את האות:" : "🎵 מצא את המספר:"}
        </p>
        {mode==="letters" ? (
          <div className="font-black leading-none mb-1"
            style={{fontSize:90,color:ZONE_COLOR,textShadow:`0 0 30px ${ZONE_COLOR}`}}>
            {target.letter}
          </div>
        ) : (
          <div className="font-black leading-none mb-1"
            style={{fontSize:90,color:ZONE_COLOR,textShadow:`0 0 30px ${ZONE_COLOR}`}}>
            {target.number}
          </div>
        )}
        <div style={{fontSize:40}}>{mode==="letters" ? target.emoji : target.emoji}</div>
        <button onClick={()=> narrator.say(
          mode==="letters" ? `${target.letter} כמו ${target.word}` : `${target.number} ${target.word}`,
          {priority:true})}
          className="mt-2 rounded-full px-4 py-1.5 text-xs font-black border active:scale-90"
          style={{background:ZONE_COLOR+"22",borderColor:ZONE_COLOR+"66",color:ZONE_COLOR}}>
          🔊 שמע שוב
        </button>
      </div>

      {/* 4 answer buttons */}
      <div className="grid grid-cols-2 gap-3 w-full max-w-sm">
        {options.map((item,idx)=>(
          <AnswerBtn key={idx}
            label={mode==="letters" ? item.letter : String(item.number)}
            sublabel={mode==="letters" ? item.word : item.word}
            onClick={()=>choose(idx,item)}
            state={states[idx]||"idle"}
            accentColor={ZONE_COLOR}/>
        ))}
      </div>
    </div>
  );
}

    <div className="flex-1 flex flex-col items-center justify-center px-4 gap-4">

        style={{background:`linear-gradient(135deg,${ZONE_COLOR}22,#050015)`,

        <div className="text-white font-bold text-lg mt-3">{msg}</div>
      </div>
      <div className="flex gap-3">
        <button onClick={onReplay}
          className="px-7 py-3 rounded-full font-black text-lg text-black active:scale-95"
          style={{background:`linear-gradient(135deg,${ZONE_COLOR},#7C3AED)`}}>

  );
}

              style={{background:"#FFD70022",color:"#FFD700",border:"1px solid #FFD70044"}}>
              ⭐ {currentScore}/{totalRounds}
            </div>
          </div>

          {gameType==="hear"  && <HearAndTapGame  hero={hero} narrator={narrator} onScore={setCurrentScore} onDone={handleDone} mode={contentMode}/>}
          {gameType==="match" && <MatchPicGame     hero={hero} narrator={narrator} onScore={setCurrentScore} onDone={handleDone} mode={contentMode}/>}
          {gameType==="tap"   && <TapLetterGame    hero={hero} narrator={narrator} onScore={setCurrentScore} onDone={handleDone} mode={contentMode}/>}
        </>
      )}

      {/* ── SUMMARY ── */}
      {screen==="summary" && (
        <LettersSummary
          score={finalScore} total={totalRounds}
          gameTitle={`${gameObj?.emoji} ${gameObj?.title} — ${contentMode==="letters"?"אותיות":"מספרים"}`}
          onReplay={()=>startGame(gameType,contentMode)}
          onBack={()=>setScreen("menu")} hero={hero}/>
      )}


    </div>
  );
}
