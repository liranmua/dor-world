<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>עולם דור - הכנה לכיתה א׳</title>
    
    <!-- ייבוא פונטים וספריות - גרסאות יציבות -->
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        :root {
            --hero-blue: #2e5bff;
            --hero-red: #ff4757;
            --hero-yellow: #ffa502;
            --hero-green: #2ed573;
            --comic-black: #2f3542;
            --comic-white: #ffffff;
            --bg-gradient: radial-gradient(circle, #1e3799 0%, #0c2461 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Heebo', sans-serif;
            background: var(--bg-gradient);
            background-color: #0c2461;
            color: var(--comic-white);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        /* סגנון קומיקס ייחודי לכפתורים */
        .btn-geometric {
            transition: all 0.1s ease;
            cursor: pointer;
            border: 4px solid var(--comic-black);
            box-shadow: 0 6px 0 0 var(--comic-black);
            position: relative;
        }

        .btn-geometric:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 0 var(--comic-black);
        }

        /* סגנון כרטיסי משימה */
        .card-geometric {
            background: var(--comic-white);
            border: 6px solid var(--comic-black);
            border-radius: 32px;
            color: var(--comic-black);
            box-shadow: 0 12px 0 var(--comic-black);
        }

        /* פס התקדמות */
        .progress-container {
            height: 24px;
            background: #57606f;
            border-radius: 12px;
            border: 3px solid white;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--hero-green), #55efc4);
            border-right: 3px solid white;
            transition: width 0.5s ease-out;
        }

        /* אנימציות */
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float { animation: floating 3s ease-in-out infinite; }

        @keyframes pulse-soft {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.98); }
        }
        .animate-pulse-soft { animation: pulse-soft 2s ease-in-out infinite; }
        
        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- נתונים ---
        const HEROES = [
            { id: 'fire', name: 'גִּבּוֹר הָאֵשׁ', emoji: '🔥', color: '#ff4757' },
            { id: 'water', name: 'גִּבּוֹר הַמַּיִם', emoji: '🌊', color: '#2e5bff' },
            { id: 'wind', name: 'גִּבּוֹר הָרוּחַ', emoji: '🌪️', color: '#2ed573' },
            { id: 'thunder', name: 'גִּבּוֹר הַבָּרָק', emoji: '⚡', color: '#ffa502' },
        ];

        const SOLUTIONS = [
            { id: 1, label: 'לִנְשֹׁום עָמֹוק', emoji: '🫁', color: '#ff4757' },
            { id: 2, label: 'לִסְפֹּר עַד 10', emoji: '🔢', color: '#2e5bff' },
            { id: 3, label: 'לְבַקֵּשׁ עֶזְרָה', emoji: '🗣️', color: '#2ed573' },
            { id: 4, label: 'לִשְׁתּוֹת מַיִם', emoji: '🚰', color: '#22d3ee' },
            { id: 5, label: 'לָלֶכֶת הַצִּידָה', emoji: '🚶', color: '#a78bfa' },
            { id: 6, label: 'לְדַבֵּר עִם חָבֵר', emoji: '💬', color: '#ffa502' },
        ];

        // --- רכיבים ---
        const Header = ({ save, hero }) => (
            <header className="flex items-center justify-between p-4 md:p-6 bg-black/20 border-b-4 border-[#2f3542] w-full">
                <div className="flex items-center gap-3 text-right">
                    <div className="w-16 h-16 bg-[#ffa502] border-4 border-[#2f3542] rounded-full flex items-center justify-center text-3xl shadow-md animate-float">
                        {hero?.emoji || '🦸'}
                    </div>
                    <div>
                        <h2 className="text-white font-black text-xl leading-none">דּוֹר הַגִּבּוֹר</h2>
                        <p className="text-[#ffa502] font-black text-lg">שָׁלָב {save.level}</p>
                    </div>
                </div>
                <div className="flex gap-2">
                    <div className="bg-[#2f3542] px-3 py-1 rounded-full border-2 border-[#ffa502] flex items-center gap-1">
                        <span className="text-[#ffa502]">⭐</span>
                        <span className="text-white font-black text-sm">{save.xp}</span>
                    </div>
                    <div className="bg-[#2f3542] px-3 py-1 rounded-full border-2 border-[#ffa502] flex items-center gap-1">
                        <span className="text-[#ffa502]">⚡</span>
                        <span className="text-white font-black text-sm">{save.history.length}</span>
                    </div>
                </div>
            </header>
        );

        // --- מסך בחירה ---
        const HeroSelection = ({ onSelect }) => (
            <div className="flex flex-col items-center justify-center flex-1 p-6 fade-in text-center">
                <div className="text-7xl mb-4 animate-float">🌍</div>
                <h1 className="text-4xl font-black text-white mb-6" style={{ textShadow: '3px 3px 0 var(--comic-black)' }}>עוֹלָם דּוֹר</h1>
                <div className="grid grid-cols-2 gap-4 w-full max-w-md">
                    {HEROES.map(h => (
                        <button key={h.id} onClick={() => onSelect(h.id)} className="btn-geometric p-6 rounded-[24px] flex flex-col items-center gap-2" style={{ backgroundColor: h.color }}>
                            <span className="text-5xl">{h.emoji}</span>
                            <span className="text-white font-black text-lg">{h.name}</span>
                        </button>
                    ))}
                </div>
            </div>
        );

        // --- מסך בית ---
        const Home = ({ save, onNavigate }) => {
            const hero = HEROES.find(h => h.id === save.hero);
            return (
                <div className="flex flex-col flex-1 fade-in">
                    <Header save={save} hero={hero} />
                    <main className="flex-1 grid grid-cols-1 md:grid-cols-3 gap-6 p-6 items-center max-w-6xl mx-auto w-full">
                        <div onClick={() => onNavigate('wheel')} className="card-geometric h-80 md:h-96 p-6 flex flex-col items-center justify-between cursor-pointer hover:scale-105 transition-transform">
                            <div className="text-7xl animate-float">🎡</div>
                            <div className="text-center">
                                <h2 className="font-black text-2xl mb-1">גַּלְגַּל הַפִּתְרוֹנוֹת</h2>
                                <p className="text-[#747d8c] font-bold text-sm">אֵיךְ לְנַצֵּחַ כְּשֶׁיֵּשׁ רֶגֶשׁ חָזָק?</p>
                            </div>
                            <button className="btn-geometric w-full py-3 bg-[#2e5bff] text-white font-black text-lg rounded-xl">בּוֹא נְשַׂחֵק!</button>
                        </div>
                        <div className="card-geometric h-80 md:h-96 p-6 flex flex-col items-center justify-between opacity-60 grayscale-[0.3] relative">
                            <div className="absolute top-4 bg-[#ffa502] px-3 font-black text-xs border-2 border-black rounded-lg">בְּקָרוֹב!</div>
                            <div className="text-7xl">📚</div>
                            <h2 className="font-black text-2xl">מִגְדַּל הָאוֹתִיּוֹת</h2>
                            <button className="w-full py-3 bg-gray-200 text-gray-500 font-black rounded-xl cursor-not-allowed">נָעוּל</button>
                        </div>
                        <div className="card-geometric h-80 md:h-96 p-6 flex flex-col items-center justify-between opacity-60 grayscale-[0.3]">
                            <div className="text-7xl">🧩</div>
                            <h2 className="font-black text-2xl">מַעְבָּדַת הַהִגָּיוֹן</h2>
                            <button className="w-full py-3 bg-gray-200 text-gray-500 font-black rounded-xl cursor-not-allowed">נָעוּל</button>
                        </div>
                    </main>
                    <footer className="bg-[#2f3542] p-4 flex flex-col items-center gap-4">
                        <div className="w-full max-w-md">
                            <div className="progress-container">
                                <div className="progress-fill" style={{ width: `${save.xp % 100}%` }}></div>
                                <div className="absolute inset-0 flex items-center justify-center text-[10px] font-black text-white">הִתְקַדְּמוּת לַמַּתָּנָה: {save.xp % 100}%</div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        // --- גלגל הפתרונות ---
        const Wheel = ({ onBack, onComplete }) => {
            const [spinning, setSpinning] = useState(false);
            const [rotation, setRotation] = useState(0);
            const [result, setResult] = useState(null);

            const spin = () => {
                if (spinning) return;
                setResult(null);
                setSpinning(true);
                const extra = 1440 + Math.floor(Math.random() * 360);
                const newRotation = rotation + extra;
                setRotation(newRotation);
                setTimeout(() => {
                    setSpinning(false);
                    const index = Math.floor((newRotation % 360) / (360 / SOLUTIONS.length));
                    setResult(SOLUTIONS[index]);
                }, 3000);
            };

            return (
                <div className="flex flex-col items-center justify-center flex-1 p-6 fade-in text-center">
                    <button onClick={onBack} className="absolute top-6 right-6 btn-geometric w-12 h-12 bg-white rounded-xl flex items-center justify-center text-xl">◀</button>
                    {!result ? (
                        <div className="flex flex-col items-center gap-8">
                            <h2 className="text-3xl font-black text-white" style={{ textShadow: '2px 2px 0 black' }}>גַּלְגַּל הַפִּתְרוֹנוֹת</h2>
                            <div className="relative w-64 h-64 md:w-80 md:h-80 rounded-full border-8 border-[#2f3542] shadow-2xl overflow-hidden transition-transform duration-[3s] cubic-bezier(0.15, 0, 0.15, 1)" style={{ transform: `rotate(${rotation}deg)`, background: 'conic-gradient(#ff4757 0% 16%, #2e5bff 16% 32%, #2ed573 32% 48%, #22d3ee 48% 64%, #a78bfa 64% 80%, #ffa502 80% 100%)' }}>
                                {SOLUTIONS.map((s, i) => (
                                    <div key={i} className="absolute w-full h-full flex justify-center pt-6" style={{ transform: `rotate(${i * 60 + 30}deg)` }}>
                                        <span className="text-4xl">{s.emoji}</span>
                                    </div>
                                ))}
                            </div>
                            <button onClick={spin} disabled={spinning} className="btn-geometric px-12 py-6 bg-[#ffa502] text-white font-black text-2xl rounded-2xl animate-pulse-soft">
                                {spinning ? 'מִסְתּוֹבֵב...' : 'סוֹבֵב אֶת הַגַּלְגַּל!'}
                            </button>
                        </div>
                    ) : (
                        <div className="flex flex-col items-center gap-6 card-geometric p-10 max-w-sm w-full fade-in">
                            <div className="text-8xl animate-float">{result.emoji}</div>
                            <h3 className="text-4xl font-black">{result.label}</h3>
                            <p className="text-gray-500 font-bold">יוֹפִי דּוֹר! זֶה פִּתְרוֹן מְעוּלֶה.</p>
                            <button onClick={() => onComplete(25)} className="btn-geometric w-full py-4 bg-[#2ed573] text-white font-black text-xl rounded-xl">הִצְלַחְתִּי! +25 ⚡</button>
                        </div>
                    )}
                </div>
            );
        };

        // --- אפליקציה ---
        const App = () => {
            const [screen, setScreen] = useState('hero-select');
            const [save, setSave] = useState(() => {
                try {
                    const local = localStorage.getItem('dor_world_v3');
                    return local ? JSON.parse(local) : { xp: 0, level: 1, hero: null, history: [] };
                } catch (e) {
                    return { xp: 0, level: 1, hero: null, history: [] };
                }
            });

            const updateSave = (newData) => {
                setSave(newData);
                localStorage.setItem('dor_world_v3', JSON.stringify(newData));
            };

            const addXP = (val) => {
                const newXP = save.xp + val;
                const newLevel = Math.floor(newXP / 100) + 1;
                updateSave({ ...save, xp: newXP, level: newLevel, history: [...save.history, { d: Date.now() }] });
            };

            // אם כבר יש גיבור, נדלג ישר למסך הבית
            useEffect(() => {
                if (save.hero) setScreen('home');
            }, []);

            const selectHero = (id) => {
                updateSave({ ...save, hero: id });
                setScreen('home');
            };

            return (
                <div className="flex flex-col flex-1 w-full max-w-full overflow-hidden">
                    {screen === 'hero-select' && <HeroSelection onSelect={selectHero} />}
                    {screen === 'home' && <Home save={save} onNavigate={setScreen} />}
                    {screen === 'wheel' && <Wheel onBack={() => setScreen('home')} onComplete={(xp) => { addXP(xp); setScreen('home'); }} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
