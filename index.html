// GAME 1 — זיכרון זוגות (Memory pairs)
// ════════════════════════════════════════════════════════
function MemoryGame({hero, narrator, theme, onDone}){
  const pairs = theme.items.slice(0,6); // 6 pairs = 12 cards
  const [cards] = useState(()=>{
    const deck = [...pairs,...pairs].map((c,i)=>({...c, uid:i, flipped:false, matched:false}));
    return shuffleArr(deck);
  });
  const [board, setBoard] = useState(()=>cards.map(c=>({...c})));
  const [selected, setSelected] = useState([]);
  const [locked, setLocked] = useState(false);
  const [moves, setMoves] = useState(0);
  const [matchCount, setMatchCount] = useState(0);
  const [flash, setFlash] = useState({show:false,correct:false});

  useEffect(()=>{
    narrator.say("זיכרון זוגות! מצא שני אותו דבר!", {priority:true});
  },[]);

  const flip = (idx) => {
    if(locked) return;
    const card = board[idx];
    if(card.flipped || card.matched) return;
    narrator.say(card.name,{priority:false});
    const newBoard = board.map((c,i)=>i===idx?{...c,flipped:true}:c);
    setBoard(newBoard);
    const newSel = [...selected, idx];
    if(newSel.length===2){
      setLocked(true);
      setMoves(m=>m+1);
      const [a,b] = newSel;
      if(newBoard[a].id===newBoard[b].id){
        // match!
        setTimeout(()=>{
          setBoard(bb=>bb.map((c,i)=>i===a||i===b?{...c,matched:true}:c));
          setSelected([]);
          setLocked(false);
          const nm=matchCount+1;
          setMatchCount(nm);
          setFlash({show:true,correct:true});
          setTimeout(()=>setFlash({show:false,correct:false}),600);
          narrator.say("זוג נמצא! מעולה!",{priority:true});
          if(nm===pairs.length) setTimeout(()=>onDone(moves+1),600);
        },600);
      } else {
        setTimeout(()=>{
          setBoard(bb=>bb.map((c,i)=>i===a||i===b?{...c,flipped:false}:c));
          setSelected([]);
          setLocked(false);
          setFlash({show:true,correct:false});
          setTimeout(()=>setFlash({show:false,correct:false}),500);
        },900);
      }
    } else {
      setSelected(newSel);
    }
  };

  return(
    <div className="flex-1 flex flex-col items-center px-3 pb-4">
      <FlashResult show={flash.show} correct={flash.correct}/>
      <div className="flex justify-between w-full max-w-sm mb-3 px-1">
        <div className="rounded-full px-3 py-1 text-xs font-black"
          style={{background:PUZZLE_COLOR+"22",color:PUZZLE_COLOR,border:`1px solid ${PUZZLE_COLOR}44`}}>
          🎯 {matchCount}/{pairs.length} זוגות
        </div>
        <div className="rounded-full px-3 py-1 text-xs font-black"
          style={{background:"#FFD70022",color:"#FFD700",border:"1px solid #FFD70044"}}>
          👆 {moves} מהלכים
        </div>
      </div>
      <div className="grid grid-cols-4 gap-2 w-full max-w-sm">
        {board.map((card,idx)=>(
          <button key={card.uid} onClick={()=>flip(idx)}
            className="rounded-2xl flex items-center justify-center active:scale-90 transition-all border-2"
            style={{
              height:72, fontSize:card.flipped||card.matched?36:28,
              background: card.matched ? `linear-gradient(135deg,${PUZZLE_COLOR}44,${PUZZLE_COLOR}22)`
                        : card.flipped ? "#ffffff18"
                        : `linear-gradient(135deg,${hero.color}33,#050015)`,
              borderColor: card.matched ? PUZZLE_COLOR : card.flipped ? "#ffffff44" : hero.accent+"44",
              boxShadow: card.matched ? `0 0 12px ${PUZZLE_COLOR}66` : "none",
            }}>
            {card.flipped||card.matched ? card.icon : "❓"}
          </button>
        ))}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════
// GAME 2 — מיון וקטגוריות
// ════════════════════════════════════════════════════════
function SortGame({hero, narrator, onDone}){
  const [catSet] = useState(()=>SORT_CATEGORIES[Math.floor(Math.random()*SORT_CATEGORIES.length)]);
  const allItems = shuffleArr([...catSet.cats[0].items,...catSet.cats[1].items])
    .map((item,i)=>({...item,id:i,catId: catSet.cats[0].items.find(x=>x.icon===item.icon) ? catSet.cats[0].id : catSet.cats[1].id}));
  const [queue, setQueue] = useState(allItems);
  const [placed, setPlaced] = useState({[catSet.cats[0].id]:[], [catSet.cats[1].id]:[]});
  const [current, setCurrent] = useState(0);
  const [flash, setFlash] = useState({show:false,correct:false});
  const [wrongCat, setWrongCat] = useState(null);
  const [done, setDone] = useState(false);

  useEffect(()=>{
    narrator.say(`${catSet.label}! ${queue[0]?.n} — לאן שייך?`,{priority:true});
  },[]);

  const place = (catId) => {
    const item = queue[current];
    if(!item) return;
    narrator.say(catSet.cats.find(c=>c.id===catId)?.label||"",{priority:true});
    if(item.catId===catId){
      setFlash({show:true,correct:true});
      setTimeout(()=>setFlash({show:false,correct:false}),500);
      const newPlaced = {...placed, [catId]:[...placed[catId],item]};
      setPlaced(newPlaced);
      const next = current+1;
      if(next>=queue.length){ setDone(true); setTimeout(()=>onDone(Object.values(newPlaced).flat().length),600); }
      else {
        setCurrent(next);
        narrator.say(`${queue[next]?.n} — לאן שייך?`,{priority:false});
      }
    } else {
      setWrongCat(catId);
      setFlash({show:true,correct:false});
      setTimeout(()=>{setWrongCat(null);setFlash({show:false,correct:false});},700);
      narrator.say("נסה שוב!",{priority:true});
    }
  };

  const item = queue[current];

  return(
    <div className="flex-1 flex flex-col items-center px-3 pb-4">
      <FlashResult show={flash.show} correct={flash.correct}/>
      <div className="text-center mb-3 font-black text-white text-sm">{catSet.label}</div>

      {/* current item */}
      {item && !done && (
        <div className="w-full max-w-sm rounded-3xl p-4 mb-4 border-2 text-center"
          style={{background:PUZZLE_COLOR+"18",borderColor:PUZZLE_COLOR+"55",
            boxShadow:`0 0 20px ${PUZZLE_COLOR}33`}}>
          <div style={{fontSize:72}}>{item.icon}</div>
          <div className="text-white font-black text-xl mt-1">{item.n}</div>
          <div className="text-gray-400 text-xs mt-0.5">{current+1}/{queue.length}</div>
        </div>
      )}

      {/* two category buckets */}
      <div className="flex gap-3 w-full max-w-sm">
        {catSet.cats.map(cat=>(
          <button key={cat.id} onClick={()=>place(cat.id)}
            className="flex-1 rounded-3xl p-3 border-3 flex flex-col items-center active:scale-95 transition-all"
            style={{
              border:"3px solid",
              borderColor: wrongCat===cat.id ? "#FF4444" : cat.color+"66",
              background: wrongCat===cat.id ? "#FF000022":`linear-gradient(135deg,${cat.color}22,#050015)`,
              boxShadow: wrongCat===cat.id?"0 0 16px #FF444466":"none",
              animation: wrongCat===cat.id?"wrongShake 0.5s ease":"none",
              minHeight:120,
            }}>
            <div className="font-black text-white text-sm mb-2">{cat.label}</div>
            <div className="flex flex-wrap gap-1 justify-center">
              {placed[cat.id].map((p,i)=>(
                <span key={i} className="text-2xl" style={{animation:"correctPop 0.3s ease"}}>{p.icon}</span>
              ))}
            </div>
          </button>
        ))}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════
// GAME 3 — צל וצורה (shadow matching)
// ════════════════════════════════════════════════════════
function ShadowGame({hero, narrator, theme, onDone}){
  const ROUNDS = 8;
  const [round, setRound] = useState(0);
  const [score, setScore] = useState(0);
  const [options, setOptions] = useState([]);
  const [target, setTarget] = useState(null);
  const [chosen, setChosen] = useState(null);
  const [flash, setFlash] = useState({show:false,correct:false});

  const makeRound = () => {
    const pool = shuffleArr(theme.items).slice(0,4);
    const tgt  = pool[Math.floor(Math.random()*4)];
    setOptions(pool); setTarget(tgt); setChosen(null);
    narrator.say(`מצא את הצל! איזה צורה מתאימה?`,{priority:true});
    setTimeout(()=>narrator.say(tgt.name,{priority:false}),1200);
  };

  useEffect(()=>{ makeRound(); },[]);

  const choose = (item) => {
    if(chosen) return;
    narrator.say(item.name,{priority:true});
    setChosen(item);
    const correct = item.id===target.id;
    setFlash({show:true,correct});
    setTimeout(()=>setFlash({show:false,correct:false}),600);
    if(correct){
      narrator.say("מצאת! מעולה!",{priority:false});
      const ns=score+1; setScore(ns);
      setTimeout(()=>{ if(round+1>=ROUNDS) onDone(ns); else{setRound(r=>r+1);makeRound();} },1000);
    } else {
      narrator.say("לא זה! נסה שוב!",{priority:true});
      setTimeout(()=>setChosen(null),700);
    }
  };

  if(!target) return null;

  return(
    <div className="flex-1 flex flex-col items-center px-4 pb-4">
      <FlashResult show={flash.show} correct={flash.correct}/>
      <div className="flex gap-1 justify-center mb-3">
        {Array.from({length:ROUNDS}).map((_,i)=>(
          <div key={i} className="rounded-full" style={{
            width:i===round?14:9,height:i===round?14:9,
            background:i<round?"#FFD700":i===round?PUZZLE_COLOR:"#333",
          }}/>
        ))}
      </div>

      {/* shadow (blacked-out silhouette) */}
      <div className="w-full max-w-sm rounded-3xl p-5 mb-4 border-2 text-center"
        style={{background:"#111",borderColor:PUZZLE_COLOR+"55"}}>
        <p className="text-gray-400 text-xs font-black mb-2">מה הצל הזה?</p>
        <div style={{
          fontSize:90, filter:"brightness(0)", display:"inline-block",
          animation:"heroFloat 2s ease-in-out infinite",
        }}>{target.icon}</div>
      </div>

      {/* 4 coloured options */}
      <div className="grid grid-cols-2 gap-3 w-full max-w-sm">
        {options.map((item,idx)=>{
          const isChosen = chosen?.id===item.id;
          const correct  = isChosen && item.id===target.id;
          const wrong    = isChosen && item.id!==target.id;
          return(
            <button key={idx} onClick={()=>choose(item)}
              className="rounded-3xl flex flex-col items-center justify-center border-4 active:scale-90 transition-all"
              style={{
                height:90,
                background: correct?"linear-gradient(135deg,#003300,#00CC44)"
                          : wrong  ?"linear-gradient(135deg,#330000,#CC2200)"
                          : `linear-gradient(135deg,${PUZZLE_COLOR}22,#050015)`,
                borderColor: correct?"#00FF88":wrong?"#FF4444":PUZZLE_COLOR+"55",
                animation: wrong?"wrongShake 0.5s ease":correct?"correctPop 0.4s ease":"none",
                boxShadow: correct?"0 0 20px #00FF8877":wrong?"0 0 12px #FF444477":"none",
              }}>
              <span style={{fontSize:44}}>{item.icon}</span>
              <span className="text-white font-black text-xs mt-0.5">{item.name}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════
// GAME 4 — השלם דפוסים (pattern completion)
// ════════════════════════════════════════════════════════
const PATTERN_SETS = [
  {items:["🔴","🔵","🔴","🔵","🔴","❓"], answer:"🔵", options:["🔵","🔴","🟡","🟢"], desc:"אדום כחול אדום כחול..."},
  {items:["⭐","⭐","🌙","⭐","⭐","❓"], answer:"🌙", options:["🌙","⭐","☀️","💫"], desc:"כוכב כוכב ירח..."},
  {items:["🐶","🐱","🐶","🐱","🐶","❓"], answer:"🐱", options:["🐱","🐶","🐸","🐭"], desc:"כלב חתול כלב חתול..."},
  {items:["🍎","🍌","🍎","🍌","🍎","❓"], answer:"🍌", options:["🍌","🍎","🍓","🍇"], desc:"תפוח בננה תפוח בננה..."},
  {items:["🔺","🔷","🔺","🔷","🔺","❓"], answer:"🔷", options:["🔷","🔺","🔶","🔹"], desc:"משולש יהלום משולש..."},
  {items:["🚗","🚗","✈️","🚗","🚗","❓"], answer:"✈️", options:["✈️","🚗","🚢","🚂"], desc:"מכונית מכונית מטוס..."},
  {items:["1️⃣","2️⃣","1️⃣","2️⃣","1️⃣","❓"], answer:"2️⃣", options:["2️⃣","1️⃣","3️⃣","4️⃣"], desc:"אחד שתיים אחד שתיים..."},
  {items:["🌞","🌞","🌧️","🌞","🌞","❓"], answer:"🌧️", options:["🌧️","🌞","⛄","🌈"], desc:"שמש שמש גשם שמש שמש..."},
];

function PatternGame({hero, narrator, onDone}){
  const ROUNDS = 6;
  const [round, setRound] = useState(0);
  const [score, setScore] = useState(0);
  const [pat, setPat] = useState(()=>shuffleArr(PATTERN_SETS)[0]);
  const [chosen, setChosen] = useState(null);
  const [flash, setFlash] = useState({show:false,correct:false});
  const usedPats = React.useRef(new Set([0]));

  useEffect(()=>{
    narrator.say(`השלם את הדפוס! ${pat.desc} מה הבא?`,{priority:true});
  },[]);

  const nextPat = () => {
    const avail = PATTERN_SETS.filter((_,i)=>!usedPats.current.has(i));
    const pool  = avail.length>0?avail:PATTERN_SETS;
    const idx   = Math.floor(Math.random()*pool.length);
    usedPats.current.add(PATTERN_SETS.indexOf(pool[idx]));
    return pool[idx];
  };

  const choose = (opt) => {
    if(chosen) return;
    narrator.say(opt,{priority:true});
    setChosen(opt);
    const correct = opt===pat.answer;
    setFlash({show:true,correct});
    setTimeout(()=>setFlash({show:false,correct:false}),500);
    if(correct){
      narrator.say("כן! נכון! מעולה!",{priority:false});
      const ns=score+1; setScore(ns);
      setTimeout(()=>{
        if(round+1>=ROUNDS) onDone(ns);
        else { const np=nextPat(); setPat(np); setChosen(null); setRound(r=>r+1);
          setTimeout(()=>narrator.say(`${np.desc} מה הבא?`,{priority:true}),200); }
      },900);
    } else {
      narrator.say("לא זה! נסה שוב!",{priority:true});
      setTimeout(()=>setChosen(null),700);
    }
  };

  return(
    <div className="flex-1 flex flex-col items-center px-4 pb-4">
      <FlashResult show={flash.show} correct={flash.correct}/>
      <div className="flex gap-1.5 justify-center mb-3">
        {Array.from({length:ROUNDS}).map((_,i)=>(
          <div key={i} className="rounded-full" style={{
            width:i===round?14:10,height:i===round?14:10,
            background:i<round?"#FFD700":i===round?PUZZLE_COLOR:"#333",
          }}/>
        ))}
      </div>

      {/* pattern strip */}
      <div className="w-full max-w-sm rounded-3xl p-4 mb-4 border-2 text-center"
        style={{background:`linear-gradient(135deg,${PUZZLE_COLOR}18,#050015)`,borderColor:PUZZLE_COLOR+"55"}}>
        <p className="text-gray-300 text-xs font-black mb-2">מה הבא בדפוס?</p>
        <div className="flex justify-center gap-1 flex-wrap">
          {pat.items.map((item,i)=>(
            <div key={i} className="rounded-2xl flex items-center justify-center border-2"
              style={{
                width:46,height:46,fontSize:26,
                background: item==="❓"?`linear-gradient(135deg,${PUZZLE_COLOR}44,${PUZZLE_COLOR}22)`:PUZZLE_COLOR+"11",
                borderColor: item==="❓"?PUZZLE_COLOR:PUZZLE_COLOR+"33",
                boxShadow: item==="❓"?`0 0 12px ${PUZZLE_COLOR}66`:"none",
                animation: item==="❓"?"heroFloat 1.5s ease-in-out infinite":"none",
              }}>
              {item}
            </div>
          ))}
        </div>
      </div>

      {/* 4 options */}
      <div className="grid grid-cols-2 gap-3 w-full max-w-sm">
        {pat.options.map((opt,idx)=>{
          const isChosen=chosen===opt, correct=isChosen&&opt===pat.answer, wrong=isChosen&&opt!==pat.answer;
          return(
            <button key={idx} onClick={()=>choose(opt)}
              className="rounded-3xl flex items-center justify-center border-4 active:scale-90 transition-all"
              style={{
                height:80, fontSize:44,
                background: correct?"linear-gradient(135deg,#003300,#00CC44)"
                          : wrong  ?"linear-gradient(135deg,#330000,#CC2200)"
                          : `linear-gradient(135deg,${PUZZLE_COLOR}22,#050015)`,
                borderColor: correct?"#00FF88":wrong?"#FF4444":PUZZLE_COLOR+"55",
                animation: wrong?"wrongShake 0.5s ease":correct?"correctPop 0.4s ease":"none",
                boxShadow: correct?"0 0 20px #00FF8877":wrong?"0 0 12px #FF444477":"none",
              }}>
              {opt}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// PUZZLE SUMMARY
// ════════════════════════════════════════════════════════
function PuzzleSummary({score, total, gameTitle, onReplay, onBack}){
  const pct  = total>0?Math.round((score/total)*100):100;
  const stars = pct===100?5:pct>=80?4:pct>=60?3:pct>=40?2:1;
  const msg  = pct===100?"מושלם! אלוף הפאזלים! 👑"
             : pct>=80?"מעולה מאוד! 🌟"
             : pct>=60?"יפה מאוד! 💪"
             : "כל הכבוד שניסית! 🤗";
  return(
    <div className="flex-1 flex flex-col items-center justify-center px-4 gap-4">
      <div style={{fontSize:70,animation:"heroFloat 2s ease-in-out infinite"}}>
        {pct===100?"🏆":pct>=80?"🌟":"💪"}
      </div>
      <div className="w-full max-w-sm rounded-3xl p-6 border-4 text-center"
        style={{background:`linear-gradient(135deg,${PUZZLE_COLOR}22,#050015)`,
          borderColor:PUZZLE_COLOR,boxShadow:`0 0 28px ${PUZZLE_COLOR}44`}}>
        <div className="text-white font-black text-lg mb-1">{gameTitle}</div>
        <div className="font-black mb-2" style={{fontSize:52,color:PUZZLE_COLOR,textShadow:`0 0 20px ${PUZZLE_COLOR}`}}>
          {total>0?`${score}/${total}`:"✅"}
        </div>
        <Stars n={stars} max={5} size={22}/>
        <div className="text-white font-bold text-lg mt-3">{msg}</div>
      </div>
      <div className="flex gap-3">
        <button onClick={onReplay}
          className="px-7 py-3 rounded-full font-black text-lg text-black active:scale-95"
          style={{background:`linear-gradient(135deg,${PUZZLE_COLOR},#3B82F6)`}}>
          🔄 שוב!
        </button>
        <button onClick={onBack}
          className="px-7 py-3 rounded-full font-black text-lg border active:scale-95"
          style={{background:"#ffffff08",borderColor:PUZZLE_COLOR,color:PUZZLE_COLOR}}>
          🏠 תפריט
        </button>
      </div>
    </div>
  );
}

      </div>

      {/* ── MENU ── */}

            <div className="relative bg-white rounded-2xl px-4 py-3 border-4 inline-block"
              style={{borderColor:PUZZLE_COLOR}}>
              <p className="text-gray-900 font-black text-base">דור! בחר משחק הרכבה!</p>

                style={{background:`linear-gradient(135deg,${PUZZLE_COLOR}18,#050015)`,

          {gameType==="pattern" && <PatternGame hero={hero} narrator={narrator}                onDone={(s)=>handleDone(s,6)}/>}
        </>
      )}

      {/* ── SUMMARY ── */}
      {screen==="summary" && (
        <PuzzleSummary
          score={finalScore} total={finalTotal}
          gameTitle={`${gameObj?.emoji} ${gameObj?.title}${theme?` · ${theme.label}`:""}`}
          onReplay={()=>{ if(gameObj?.needsTheme) setScreen("theme"); else setScreen("playing"); }}
          onBack={()=>setScreen("menu")}/>
      )}

      <style>{`
        @keyframes heroFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
        @keyframes wrongShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
        @keyframes correctPop{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}
        @keyframes sparkleOut{0%{opacity:1;transform:scale(0.5)}50%{opacity:1;transform:scale(1.3)}100%{opacity:0;transform:scale(1.8)}}
        @keyframes confettiFall{to{transform:translateY(110vh) rotate(360deg);opacity:0}}
      `}</style>
    </div>
  );
}

// ── Challenge: TAP type ──
function TapChallenge({challenge, onDone}){
  const [count,setCount] = useState(0);
  const [timeLeft,setTimeLeft] = useState(8);
  const [done,setDone]=useState(false);

  useEffect(()=>{
    if(done) return;
    const t = setInterval(()=>{
      setTimeLeft(tl=>{
        if(tl<=1){ clearInterval(t); setDone(true); return 0; }
        return tl-1;
      });
    },1000);
    return ()=>clearInterval(t);
  },[]);

  const tap = ()=>{ if(!done) setCount(c=>c+1); };

  return(
    <div className="flex flex-col items-center gap-4 px-4">
      <div className="w-full max-w-sm rounded-2xl p-3 border text-center"
        style={{background:challenge.color+"22",borderColor:challenge.color+"55"}}>
        <div className="text-white font-black text-sm">{challenge.desc}</div>
        <div className="text-gray-400 text-xs mt-0.5">⏱ {timeLeft} שניות נשארות</div>
      </div>
      <div className="relative">
        <div className="h-3 rounded-full overflow-hidden w-48"
          style={{background:"#333"}}>
          <div className="h-full rounded-full transition-all duration-1000"
            style={{width:`${(timeLeft/8)*100}%`,background:`linear-gradient(90deg,${challenge.color},${challenge.color}88)`}}/>
        </div>
      </div>
      <button onClick={tap} disabled={done}
        className="rounded-full flex items-center justify-center active:scale-90 transition-all disabled:opacity-50"
        style={{width:140,height:140,fontSize:72,
          background:`radial-gradient(circle,${challenge.color}44,#050015)`,
          border:`4px solid ${challenge.color}`,
          boxShadow:`0 0 30px ${challenge.color}66`}}>
        {challenge.icon}
      </button>
      <div className="font-black text-4xl" style={{color:challenge.color,textShadow:`0 0 16px ${challenge.color}`}}>
        {count}
      </div>
      {done && (
        <button onClick={()=>onDone(count)}
          className="px-8 py-3 rounded-full font-black text-xl text-black active:scale-95"
          style={{background:`linear-gradient(135deg,${challenge.color},#FFD700)`}}>
          סיים! →
        </button>
      )}
    </div>
  );
}

// ── Challenge: FIND type ──
function FindChallenge({challenge, onDone}){
  const ROUNDS = 5;
  const [round,setRound]=useState(0);
  const [score,setScore]=useState(0);
  const [grid,setGrid]=useState([]);
  const [chosen,setChosen]=useState(null);

  const makeGrid = ()=>{
    const items = [];
    const targetPos = Math.floor(Math.random()*9);
    for(let i=0;i<9;i++){
      if(i===targetPos) items.push({icon:challenge.target, isTarget:true, id:i});
      else items.push({icon:challenge.distractors[i%challenge.distractors.length], isTarget:false, id:i});
    }
    setGrid(items); setChosen(null);
  };

  useEffect(()=>{ makeGrid(); },[]);

  const pick=(item)=>{
    if(chosen!=null) return;
    setChosen(item.id);
    if(item.isTarget){
      const ns=score+1; setScore(ns);
      setTimeout(()=>{
        if(round+1>=ROUNDS) onDone(ns);
        else { setRound(r=>r+1); makeGrid(); }
      },700);
    } else {
      setTimeout(()=>setChosen(null),600);
    }
  };

  return(
    <div className="flex flex-col items-center gap-3 px-4">
      <div className="w-full max-w-sm rounded-2xl p-3 border text-center"
        style={{background:challenge.color+"22",borderColor:challenge.color+"55"}}>
        <div className="text-white font-black text-sm">{challenge.desc}</div>
        <div className="text-gray-400 text-xs">{round+1}/{ROUNDS}</div>
      </div>
      <div className="grid grid-cols-3 gap-2 w-full max-w-xs">
        {grid.map((item)=>(
          <button key={item.id} onClick={()=>pick(item)}
            className="rounded-2xl flex items-center justify-center border-2 active:scale-90 transition-all"
            style={{height:72, fontSize:38,
              background: chosen===item.id&&item.isTarget?"linear-gradient(135deg,#003300,#00CC44)"
                        : chosen===item.id&&!item.isTarget?"linear-gradient(135deg,#330000,#CC2200)"
                        : `linear-gradient(135deg,${challenge.color}18,#050015)`,
              borderColor: chosen===item.id&&item.isTarget?"#00FF88"
                         : chosen===item.id&&!item.isTarget?"#FF4444"
                         : challenge.color+"44",
              animation: chosen===item.id&&!item.isTarget?"wrongShake 0.5s ease":"none",
            }}>
            {item.icon}
          </button>
        ))}
      </div>
      <div className="font-black text-2xl" style={{color:challenge.color}}>⭐ {score}/{ROUNDS}</div>
    </div>
  );
}

// ── Main HeroZone ──
function HeroZone({hero, save, onSave, onBack}){
  const narrator = useNarrator();

  // builder state
  const [screen, setScreen] = useState("menu"); // menu|build|card|challenge|gallery
  const [step, setStep] = useState(0); // 0=body 1=cape 2=mask 3=chest 4=power 5=name
  const [bodyColor,  setBodyColor]  = useState(BODY_COLORS[0]);
  const [capeColor,  setCapeColor]  = useState(CAPE_COLORS[0]);
  const [mask,       setMask]       = useState(MASKS[0]);
  const [chestSym,   setChestSym]   = useState(CHEST_SYMBOLS[0]);
  const [power,      setPower]      = useState(SUPER_POWERS[0].id);
  const [heroName,   setHeroName]   = useState("");
  const [savedHero,  setSavedHero]  = useState(null);
  const [challenge,  setChallenge]  = useState(null);
  const [chalResult, setChalResult] = useState(null);
  const [showConfetti, setShowConfetti] = useState(false);

  const heroes = save.myHeroes || [];

  const STEPS = [
    {label:"צבע גוף",  hint:"בחר את צבע הגיבור שלך!"},
    {label:"גלימה",    hint:"איזה צבע לגלימה?"},
    {label:"מסיכה",    hint:"בחר מסיכה לגיבור!"},
    {label:"סמל",      hint:"מה הסמל על החזה?"},
    {label:"כוח-על",   hint:"מה הכוח המיוחד שלו?"},
    {label:"שם",       hint:"איך קוראים לגיבור?"},
  ];

  const heroData = { bodyColor, capeColor, mask, chestSymbol:chestSym, power, name:heroName };

  const saveHero = ()=>{
    const entry = {...heroData, savedAt:Date.now()};
    const newHeroes = [...heroes, entry];
    const newStars  = Math.min(5,(save.zone_stars?.hero||0)+1);
    onSave({...save, xp:(save.xp||0)+25, myHeroes:newHeroes,
      zone_stars:{...save.zone_stars, hero:newStars}});
    setSavedHero(entry);
    setShowConfetti(true);
    setTimeout(()=>setShowConfetti(false),2200);
    narrator.say(`הגיבור ${heroName||"שלך"} נשמר! כל הכבוד!`,{priority:true});

  const startChallenge = ()=>{
    const ch = POWER_CHALLENGES[power];
    setChallenge(ch); setChalResult(null);
    setScreen("challenge");
    narrator.say(ch.title+". "+ch.desc,{priority:true});
  };

  const handleChalDone = (score)=>{
    setChalResult(score);
    const bonus = score>=5?15:score>=3?10:5;
    onSave({...save, xp:(save.xp||0)+bonus});
    narrator.say(score>=5?"מדהים! גיבור אמיתי!":score>=3?"כל הכבוד!":"ניסיון טוב!",{priority:true});
  };

  const resetBuilder = ()=>{
    setStep(0); setBodyColor(BODY_COLORS[0]); setCapeColor(CAPE_COLORS[0]);
    setMask(MASKS[0]); setChestSym(CHEST_SYMBOLS[0]); setPower(SUPER_POWERS[0].id);

  return(
    <div className="min-h-screen flex flex-col" dir="rtl"
      style={{background:"linear-gradient(180deg,#2d0020 0%,#050015 100%)"}}>
      <Confetti active={showConfetti}/>

          style={{background:"#ffffff08",borderColor:HERO_COLOR+"44",color:HERO_COLOR}}>

        </button>
        <div className="text-center">
          <div className="text-white font-black" style={{textShadow:`0 0 10px ${HERO_COLOR}`}}>
            🦸 סדנת גיבורים
          </div>

// TOOL 1: Free Drawing Canvas
// ══════════════════════════════
function DrawingCanvas({narrator}) {
  const canvasRef   = useRef(null);
  const drawing     = useRef(false);
  const lastPos     = useRef(null);
  const [color,     setColor]     = useState("#FF4444");
  const [brushSize, setBrushSize] = useState(1); // index into BRUSH_SIZES
  const [shape,     setShape]     = useState("round");
  const [tool,      setTool]      = useState("pen"); // pen | eraser
  const [savedMsg,  setSavedMsg]  = useState(false);

  const getPos = (e, canvas) => {
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return {
      x: (src.clientX - r.left) * (canvas.width / r.width),
      y: (src.clientY - r.top)  * (canvas.height / r.height),
    };
  };

  const startDraw = (e) => {
    drawing.current = true;
    const canvas = canvasRef.current; if (!canvas) return;
    const pos = getPos(e, canvas);
    lastPos.current = pos;
    // dot on tap
    const ctx = canvas.getContext("2d");
    ctx.beginPath();
    const sz = BRUSH_SIZES[brushSize];
    if (shape === "round") {
      ctx.arc(pos.x, pos.y, sz/2, 0, Math.PI*2);
    } else {
      ctx.rect(pos.x - sz/2, pos.y - sz/2, sz, sz);
    }
    ctx.fillStyle = tool === "eraser" ? "#111827" : color;
    ctx.fill();
  };

  const draw = (e) => {
    if (!drawing.current) return;
    e.preventDefault();
    const canvas = canvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const pos = getPos(e, canvas);
    const sz = BRUSH_SIZES[brushSize];
    ctx.lineWidth = sz;
    ctx.lineCap   = shape === "round" ? "round" : "square";
    ctx.lineJoin  = "round";
    ctx.strokeStyle = tool === "eraser" ? "#111827" : color;
    ctx.beginPath();
    ctx.moveTo(lastPos.current.x, lastPos.current.y);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    lastPos.current = pos;
  };

  const endDraw = () => { drawing.current = false; lastPos.current = null; };

  const clear = () => {
    const canvas = canvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#111827";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    narrator.say("הציור נמחק", {priority:true});
  };

  useEffect(() => {
    const canvas = canvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#111827";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }, []);

  return (
    <div className="flex-1 flex flex-col items-center px-2 pb-2">
      {/* canvas */}
      <canvas ref={canvasRef} width={340} height={280}
        className="rounded-2xl border-2 touch-none mb-2"
        style={{borderColor: ART_COLOR+"44", maxWidth:"100%", cursor:"crosshair",
          boxShadow:`0 0 20px ${ART_COLOR}22`}}
        onMouseDown={startDraw} onMouseMove={draw} onMouseUp={endDraw} onMouseLeave={endDraw}
        onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={endDraw}/>

      {/* color palette */}
      <div className="flex flex-wrap gap-1.5 justify-center mb-2 max-w-sm">
        {PALETTE.map(col => (
          <button key={col} onClick={()=>{setColor(col);setTool("pen");}}
            className="rounded-full active:scale-90 transition-all"
            style={{width:30,height:30,background:col,
              border:`3px solid ${col===color&&tool==="pen"?"white":"transparent"}`,
              boxShadow:col===color&&tool==="pen"?"0 0 8px white":"none"}}/>
        ))}
      </div>

      {/* tools row */}
      <div className="flex items-center gap-2 flex-wrap justify-center">
        {/* brush sizes */}
        {BRUSH_SIZES.map((sz,i) => (
          <ToolBtn key={i} active={brushSize===i&&tool==="pen"} onClick={()=>{setBrushSize(i);setTool("pen");}}>
            <div className="rounded-full bg-white" style={{width:sz/2+2,height:sz/2+2,maxWidth:20,maxHeight:20}}/>
          </ToolBtn>
        ))}
        {/* shape toggle */}
        <ToolBtn active={shape==="square"} onClick={()=>setShape(s=>s==="round"?"square":"round")}>
          <span style={{fontSize:18}}>{shape==="round"?"⬤":"■"}</span>
        </ToolBtn>
        {/* eraser */}
        <ToolBtn active={tool==="eraser"} onClick={()=>setTool("eraser")}>
          <span style={{fontSize:18}}>🧹</span>
        </ToolBtn>
        {/* clear */}
        <ToolBtn active={false} onClick={clear} style={{background:"#FF444411",borderColor:"#FF444444"}}>
          <span style={{fontSize:18}}>🗑️</span>
        </ToolBtn>
      </div>
    </div>
  );
}

// ══════════════════════════════
// TOOL 2: Coloring Page
// ══════════════════════════════
function ColoringPage({narrator}) {
  const canvasRef = useRef(null);
  const [pageIdx, setPageIdx]   = useState(0);
  const [color,   setColor]     = useState("#FF4444");
  const [fills,   setFills]     = useState({});
  const [brushSize, setBrushSize] = useState(1);
  const drawing   = useRef(false);
  const lastPos   = useRef(null);

  const page = COLORING_PAGES[pageIdx];

  const getPos = (e, canvas) => {
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return {
      x: (src.clientX - r.left) * (canvas.width / r.width),
      y: (src.clientY - r.top)  * (canvas.height / r.height),
    };
  };

  const redraw = (currentFills) => {
    const canvas = canvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // white bg
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    // draw paths
    page.paths.forEach((path, i) => {
      ctx.beginPath();
      const p = new Path2D(path.d);
      ctx.fillStyle   = currentFills[i] || path.fill;
      ctx.strokeStyle = path.stroke;
      ctx.lineWidth   = path.sw;
      ctx.fill(p);
      if (path.sw > 0) ctx.stroke(p);
    });
  };

  useEffect(() => { redraw(fills); }, [pageIdx]);

  const paint = (e) => {
    e.preventDefault();
    if (!drawing.current) return;
    const canvas = canvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const pos = getPos(e, canvas);
    // paint brush
    const sz = BRUSH_SIZES[brushSize];
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, sz/2, 0, Math.PI*2);
    ctx.fillStyle = color;
    ctx.fill();
    if (lastPos.current) {
      ctx.lineWidth   = sz;
      ctx.lineCap     = "round";
      ctx.strokeStyle = color;
      ctx.beginPath();
      ctx.moveTo(lastPos.current.x, lastPos.current.y);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    }
    lastPos.current = pos;
  };

  const startPaint = (e) => { drawing.current = true; paint(e); };
  const endPaint   = () => { drawing.current = false; lastPos.current = null; };

  const clearPage = () => { setFills({}); redraw({}); narrator.say("נמחק! צבע שוב!", {priority:true}); };

  const changePage = (dir) => {
    const next = (pageIdx + dir + COLORING_PAGES.length) % COLORING_PAGES.length;
    setPageIdx(next); setFills({});
    narrator.say(COLORING_PAGES[next].label, {priority:true});
  };

  return (
    <div className="flex-1 flex flex-col items-center px-2 pb-2">
      {/* page selector */}
      <div className="flex items-center gap-3 mb-2">
        <button onClick={()=>changePage(-1)}
          className="rounded-full w-9 h-9 flex items-center justify-center border active:scale-90"
          style={{background:ART_COLOR+"22",borderColor:ART_COLOR+"44",color:ART_COLOR,fontSize:20}}>◀</button>
        <span className="text-white font-black text-sm">{page.emoji} {page.label}</span>
        <button onClick={()=>changePage(1)}
          className="rounded-full w-9 h-9 flex items-center justify-center border active:scale-90"
          style={{background:ART_COLOR+"22",borderColor:ART_COLOR+"44",color:ART_COLOR,fontSize:20}}>▶</button>
      </div>

      {/* canvas */}
      <canvas ref={canvasRef} width={300} height={280}
        className="rounded-2xl border-2 touch-none mb-2"
        style={{borderColor:ART_COLOR+"44",maxWidth:"100%",background:"white"}}
        onMouseDown={startPaint} onMouseMove={paint} onMouseUp={endPaint} onMouseLeave={endPaint}
        onTouchStart={startPaint} onTouchMove={paint} onTouchEnd={endPaint}/>

      {/* palette */}
      <div className="flex flex-wrap gap-1.5 justify-center mb-2 max-w-sm">
        {PALETTE.map(col => (
          <button key={col} onClick={()=>setColor(col)}
            className="rounded-full active:scale-90"
            style={{width:28,height:28,background:col,
              border:`3px solid ${col===color?"white":"transparent"}`}}/>
        ))}
      </div>

      {/* brush sizes + clear */}
      <div className="flex gap-2 items-center">
        {BRUSH_SIZES.map((sz,i) => (
          <ToolBtn key={i} active={brushSize===i} onClick={()=>setBrushSize(i)}>
            <div className="rounded-full bg-current" style={{width:sz/2+2,height:sz/2+2,maxWidth:18,maxHeight:18,background:color}}/>
          </ToolBtn>
        ))}
        <ToolBtn active={false} onClick={clearPage} style={{background:"#FF444411",borderColor:"#FF444444"}}>
          <span style={{fontSize:18}}>🗑️</span>
        </ToolBtn>
      </div>
    </div>
  );
}

// ══════════════════════════════
// TOOL 3: Letter/Number Writing
// ══════════════════════════════
function WritingPad({narrator}) {
  const canvasRef  = useRef(null);
  const guideRef   = useRef(null);
  const drawing    = useRef(false);
  const lastPos    = useRef(null);
  const [mode,     setMode]     = useState("letters"); // letters | numbers
  const [idx,      setIdx]      = useState(0);
  const [strokes,  setStrokes]  = useState([]);
  const [showGuide,setShowGuide]= useState(true);
  const [praised,  setPraised]  = useState(false);

  const current = mode==="letters" ? HEBREW_LETTERS_WRITE[idx] : {letter:String(NUMBERS_WRITE[idx])};

  const getPos = (e, canvas) => {
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return {
      x: (src.clientX - r.left) * (canvas.width / r.width),
      y: (src.clientY - r.top)  * (canvas.height / r.height),
    };
  };

  const clearCanvas = () => {
    const canvas = canvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // guide letter faint
    if (showGuide) {
      ctx.globalAlpha = 0.08;
      ctx.font        = "bold 200px Arial";
      ctx.fillStyle   = "#A78BFA";
      ctx.textAlign   = "center";
      ctx.textBaseline= "middle";
      ctx.fillText(current.letter, 150, 155);
      ctx.globalAlpha = 1;
    }
    setStrokes([]); setPraised(false);
  };

  useEffect(() => { clearCanvas(); }, [idx, mode, showGuide]);

  useEffect(() => {
    narrator.say(
      mode==="letters"
        ? `${current.letter}! עכשיו כתוב את האות ${current.letter}`
        : `${current.letter}! עכשיו כתוב את המספר ${current.letter}`,
      {priority:true}
    );
  }, [idx, mode]);

  const startStroke = (e) => {
    drawing.current = true;
    const canvas = canvasRef.current; if (!canvas) return;
    const pos = getPos(e, canvas);
    lastPos.current = pos;
    const ctx = canvas.getContext("2d");
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 8, 0, Math.PI*2);
    ctx.fillStyle = "#FF6B6B";
    ctx.fill();
  };

  const stroke = (e) => {
    if (!drawing.current) return;
    e.preventDefault();
    const canvas = canvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const pos = getPos(e, canvas);
    ctx.lineWidth   = 16;
    ctx.lineCap     = "round";
    ctx.lineJoin    = "round";
    ctx.strokeStyle = "#FF6B6B";
    ctx.shadowColor = "#FF6B6B88";
    ctx.shadowBlur  = 6;
    ctx.beginPath();
    ctx.moveTo(lastPos.current.x, lastPos.current.y);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    ctx.shadowBlur = 0;
    lastPos.current = pos;
  };

  const endStroke = () => {
    drawing.current = false;
    lastPos.current = null;
    const newStrokes = strokes.length + 1;
    setStrokes(s=>[...s, Date.now()]);
    // praise after 1st stroke
    if (!praised && newStrokes===1) {
      setPraised(true);
      narrator.say("יפה! המשך!", {priority:false});
    }
    if (newStrokes>=2) {
      narrator.say("כל הכבוד! כתבת!",{priority:true});
    }
  };

  const nextItem = () => {
    const arr = mode==="letters"?HEBREW_LETTERS_WRITE:NUMBERS_WRITE;
    setIdx(i=>(i+1)%arr.length);
  };
  const prevItem = () => {
    const arr = mode==="letters"?HEBREW_LETTERS_WRITE:NUMBERS_WRITE;
    setIdx(i=>(i-1+arr.length)%arr.length);
  };

  return (
    <div className="flex-1 flex flex-col items-center px-2 pb-2">
      {/* mode + nav */}
      <div className="flex items-center gap-2 mb-2 flex-wrap justify-center">
        <button onClick={()=>{setMode("letters");setIdx(0);}}
          className="rounded-full px-4 py-1.5 text-xs font-black border active:scale-90"
          style={{background:mode==="letters"?ART_COLOR+"44":"#ffffff10",
            borderColor:mode==="letters"?ART_COLOR:"#ffffff22",color:"white"}}>
          🔤 אותיות
        </button>
        <button onClick={()=>{setMode("numbers");setIdx(0);}}
          className="rounded-full px-4 py-1.5 text-xs font-black border active:scale-90"
          style={{background:mode==="numbers"?"#FFD70044":"#ffffff10",
            borderColor:mode==="numbers"?"#FFD700":"#ffffff22",color:"white"}}>
          🔢 מספרים
        </button>
      </div>

      {/* letter nav */}
      <div className="flex items-center gap-4 mb-2">
        <button onClick={prevItem}
          className="rounded-full w-10 h-10 flex items-center justify-center border active:scale-90"
          style={{background:ART_COLOR+"22",borderColor:ART_COLOR+"44",color:ART_COLOR,fontSize:20}}>◀</button>
        <div className="text-center">
          <div className="font-black" style={{fontSize:52,color:ART_COLOR,textShadow:`0 0 16px ${ART_COLOR}`,lineHeight:1}}>
            {current.letter}
          </div>
          {current.hint && <div className="text-gray-400 text-xs mt-0.5">{current.hint}</div>}
        </div>
        <button onClick={nextItem}
          className="rounded-full w-10 h-10 flex items-center justify-center border active:scale-90"
          style={{background:ART_COLOR+"22",borderColor:ART_COLOR+"44",color:ART_COLOR,fontSize:20}}>▶</button>
      </div>

      {/* toggle guide */}
      <button onClick={()=>setShowGuide(g=>!g)}
        className="rounded-full px-3 py-1 text-xs font-black border mb-2 active:scale-90"
        style={{background:showGuide?ART_COLOR+"22":"#ffffff08",
          borderColor:showGuide?ART_COLOR:"#ffffff22",color:showGuide?ART_COLOR:"#888"}}>
        {showGuide?"👁️ הסתר מדריך":"👁️ הצג מדריך"}
      </button>

      {/* canvas */}
      <canvas ref={canvasRef} width={300} height={300}
        className="rounded-3xl border-4 touch-none"
        style={{borderColor:ART_COLOR,background:"#111827",maxWidth:"100%",
          boxShadow:`0 0 24px ${ART_COLOR}44`}}
        onMouseDown={startStroke} onMouseMove={stroke} onMouseUp={endStroke} onMouseLeave={endStroke}
        onTouchStart={startStroke} onTouchMove={stroke} onTouchEnd={endStroke}/>

      {/* controls */}
      <div className="flex gap-3 mt-2">
        <button onClick={clearCanvas}
          className="rounded-full px-5 py-2 font-black text-sm border active:scale-90"
          style={{background:"#FF444411",borderColor:"#FF444444",color:"#FF6B6B"}}>
          🗑️ נקה
        </button>
        <button onClick={()=>narrator.say(
          mode==="letters"?`האות ${current.letter}`:`המספר ${current.letter}`,{priority:true})}
          className="rounded-full px-5 py-2 font-black text-sm border active:scale-90"
          style={{background:ART_COLOR+"22",borderColor:ART_COLOR+"44",color:ART_COLOR}}>
          🔊 שמע
        </button>
      </div>
    </div>
  );
}

// ── Main ArtZone ──
function ArtZone({hero, save, onSave, onBack}) {
  const narrator = useNarrator();
  const [tool, setTool] = useState(null); // null=menu | draw | color | write

  const TOOLS = [
    {id:"draw",  emoji:"✏️", title:"ציור חופשי",    sub:"צייר כל מה שרוצה!", color:"#FF6B6B"},
    {id:"color", emoji:"🖌️", title:"דפי צביעה",     sub:"צבע דמויות מגניבות!", color:"#FFD700"},
    {id:"write", emoji:"✍️", title:"כתיבת אותיות",  sub:"תרגל אותיות ומספרים!", color:"#A78BFA"},
  ];

  const handleBack = () => {
    if (tool) { setTool(null); narrator.say("חזרה לתפריט", {priority:true}); }
    else { narrator.stop(); onBack(); }
  };

  const selectTool = (t) => {
    setTool(t.id);
    narrator.say(t.title, {priority:true});
    // award XP first time
    if (!save.zone_stars?.art) {
      onSave({...save, xp:(save.xp||0)+15,
        zone_stars:{...save.zone_stars, art:1}});
    }
  };

  return (
    <div className="min-h-screen flex flex-col" dir="rtl"
      style={{background:"linear-gradient(180deg,#1a0500 0%,#050015 100%)"}}>

      {/* header */}
      <div className="flex items-center justify-between px-4 pt-4 pb-2 flex-shrink-0">
        <button onClick={handleBack}
          className="rounded-full px-4 py-2 text-sm font-black border active:scale-95"
          style={{background:"#ffffff08",borderColor:ART_COLOR+"44",color:ART_COLOR}}>
          {tool?"◀ תפריט":"🏠 בית"}
        </button>
        <div className="text-center">
          <div className="text-white font-black" style={{textShadow:`0 0 10px ${ART_COLOR}`}}>
            🎨 סטודיו יצירה
          </div>
          <Stars n={save.zone_stars?.art||0} max={5} size={12}/>
        </div>
        <SpeakerBtn narrator={narrator} accent={ART_COLOR}
          onRepeat={()=>narrator.say(tool?TOOLS.find(t=>t.id===tool)?.title||"":"בחר כלי יצירה!",{priority:true})}/>
      </div>

      {/* ── MENU ── */}
      {!tool && (
        <div className="flex-1 flex flex-col items-center justify-center px-4 gap-5">
          <div className="text-center flex flex-col items-center gap-3">
            <div className="text-6xl" style={{animation:"heroFloat 3s ease-in-out infinite",
              filter:`drop-shadow(0 0 16px ${ART_COLOR})`}}>🎨</div>
            <div className="relative bg-white rounded-2xl px-4 py-3 border-4" style={{borderColor:ART_COLOR}}>
              <p className="text-gray-900 font-black text-lg">דור! בחר כלי יצירה! 🎨</p>
            </div>
          </div>
          <div className="flex flex-col gap-3 w-full max-w-sm">
            {TOOLS.map(t=>(
              <button key={t.id} onClick={()=>selectTool(t)}
                className="rounded-3xl p-5 border-4 flex items-center gap-4 active:scale-95 transition-all"
                style={{background:`linear-gradient(135deg,${t.color}22,#050015)`,
                  borderColor:t.color,boxShadow:`0 0 20px ${t.color}33`}}>
                <span className="text-5xl">{t.emoji}</span>
                <div className="text-right">
                  <div className="text-white font-black text-xl">{t.title}</div>
                  <div className="text-gray-400 text-sm">{t.sub}</div>
                </div>
              </button>
            ))}
          </div>
        </div>
      )}

      {tool==="draw"  && <DrawingCanvas narrator={narrator}/>}
      {tool==="color" && <ColoringPage  narrator={narrator}/>}
      {tool==="write" && <WritingPad    narrator={narrator}/>}

      <style>{`
        @keyframes heroFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
      `}</style>
    </div>
  );
}

// ─── PLACEHOLDER for remaining zones ─────────────────────────────────────────
function ZonePlaceholder({ zone, hero, save, onSave, onBack }) {
  const earn = () => {
    onSave({...save,xp:(save.xp||0)+20,
      zone_stars:{...save.zone_stars,[zone.id]:Math.min(5,(save.zone_stars?.[zone.id]||0)+1)}});
  };
  return (
    <div className="min-h-screen flex flex-col items-center justify-center p-6 text-right"
      style={{background:`linear-gradient(135deg,${zone.darkBg} 0%,#050015 100%)`}} dir="rtl">
      <button onClick={onBack}
        className="absolute top-6 right-6 text-white font-black text-sm px-4 py-2 rounded-full border active:scale-95"
        style={{borderColor:zone.color}}>🏠 חזור</button>
      <div className="text-7xl mb-4" style={{filter:`drop-shadow(0 0 20px ${zone.color})`}}>{zone.emoji}</div>
      <h1 className="text-3xl font-black text-white mb-2">{zone.label}</h1>
      <p className="text-gray-400 mb-6">האזור הזה בבנייה... 🔧</p>
      <button onClick={earn}
        className="px-8 py-4 rounded-full font-black text-lg text-black active:scale-95"
        style={{background:`linear-gradient(135deg,${zone.color},${hero.accent})`}}>
        🧪 בדוק (+20 XP)
      </button>
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("hero-select");
  const [hero, setHero] = useState(null);
  const [save, setSave] = useState(() => loadSave());
  const [showParent, setShowParent] = useState(false);

  const persist = (data) => { setSave(data); writeSave(data); };
  const goHome = () => setScreen("home");
  const activeZone = ZONES.find(z => z.id === screen);

  if (screen === "hero-select") {
    return <HeroSelect savedXP={save.xp||0} onSelect={h=>{setHero(h);setScreen("home");}}/>;
  }
  if (!hero) return null;

  const builtZones = ["wheel","kingdom","letters","puzzle","hero","art"];

  return (
    <>
      {showParent && <ParentPanel save={save} hero={hero} onClose={()=>setShowParent(false)}/>}
      {screen==="home" && (
        <HomeScreen hero={hero} save={save}
          onZone={setScreen}
          onChangeHero={()=>setScreen("hero-select")}
          onParentOpen={()=>setShowParent(true)}/>
      )}
      {screen==="wheel"   && <WheelZone   hero={hero} save={save} onSave={persist} onBack={goHome}/>}
      {screen==="kingdom" && <KingdomZone hero={hero} save={save} onSave={persist} onBack={goHome}/>}
      {screen==="letters" && <LettersZone hero={hero} save={save} onSave={persist} onBack={goHome}/>}
      {screen==="puzzle"  && <PuzzleZone  hero={hero} save={save} onSave={persist} onBack={goHome}/>}
      {screen==="hero"    && <HeroZone    hero={hero} save={save} onSave={persist} onBack={goHome}/>}
      {screen==="art"     && <ArtZone     hero={hero} save={save} onSave={persist} onBack={goHome}/>}
      {activeZone && !builtZones.includes(screen) && (
        <ZonePlaceholder zone={activeZone} hero={hero} save={save} onSave={persist} onBack={goHome}/>
      )}
    </>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
